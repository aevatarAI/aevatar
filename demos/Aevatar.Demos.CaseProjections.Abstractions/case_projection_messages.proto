syntax = "proto3";
package aevatar.demos.caseprojections;
option csharp_namespace = "Aevatar.Demos.CaseProjections.Abstractions.Events";

message CaseStartedEvent {
  string case_id = 1;
  string run_id = 2;
  string case_type = 3;
  string title = 4;
  string input = 5;
}

message CaseOwnerAssignedEvent {
  string case_id = 1;
  string run_id = 2;
  string owner_id = 3;
}

message CaseCommentAddedEvent {
  string case_id = 1;
  string run_id = 2;
  string author_id = 3;
  string content = 4;
}

message CaseEscalatedEvent {
  string case_id = 1;
  string run_id = 2;
  int32 level = 3;
  string reason = 4;
}

message CaseResolvedEvent {
  string case_id = 1;
  string run_id = 2;
  bool resolved = 3;
  string resolution = 4;
}
