name: role_event_module_top_level_overrides_extensions_multiplex
description: |
  Precedence demo in multiplex setup.
  Top-level event_modules/event_routes select demo_csv_markdown while
  extensions.* selects demo_template. Top-level should win.

roles:
  - id: precedence_multiplex_role
    name: Precedence Multiplex Role
    system_prompt: |
      Fallback assistant. Should be bypassed by routed role event module.
    event_modules: "demo_template,demo_csv_markdown,demo_json_pick"
    event_routes: |
      - when: event.type == "ChatRequestEvent"
        to: demo_csv_markdown
    extensions:
      event_modules: "demo_template"
      event_routes: |
        - when: event.type == "ChatRequestEvent"
          to: demo_template

steps:
  - id: role_reply
    type: llm_call
    role: precedence_multiplex_role
