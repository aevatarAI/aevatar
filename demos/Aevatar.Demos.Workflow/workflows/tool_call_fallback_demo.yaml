name: tool_call_fallback_demo
description: Demonstrates tool_call failure handled via workflow-level on_error fallback.

steps:
  - id: try_missing_tool
    type: tool_call
    parameters:
      tool: "nonexistent_demo_tool"
    on_error:
      strategy: fallback
      fallback_step: use_fallback_result

  - id: use_fallback_result
    type: assign
    parameters:
      target: tool_call_status
      value: "fallback-used"
    next: done

  - id: done
    type: assign
    parameters:
      target: result
      value: "$input"
