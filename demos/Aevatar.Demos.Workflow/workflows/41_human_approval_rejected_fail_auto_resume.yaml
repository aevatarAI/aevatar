name: 41_human_approval_rejected_fail_auto_resume
description: |
  Human approval demo (auto rejected + fail path).
  Prompt contains AUTO_REJECT marker so web demo auto resume rejects approval.
  With on_reject=fail, workflow should fail at this step.

roles: []

steps:
  - id: draft_dangerous_plan
    type: assign
    parameters:
      value: "Delete production database immediately."
    next: approval_gate

  - id: approval_gate
    type: human_approval
    parameters:
      prompt: "AUTO_REJECT: Should we execute dangerous plan?"
      timeout: "120"
      on_reject: "fail"
