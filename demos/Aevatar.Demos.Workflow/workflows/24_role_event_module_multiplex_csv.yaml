name: 24_role_event_module_multiplex_csv
description: |
  Single-role multi-module routing demo.
  The role loads three custom event modules, but event_routes only routes
  ChatRequestEvent to demo_csv_markdown.

roles:
  - id: multiplex_role
    name: Multiplex Role
    system_prompt: |
      You are a fallback assistant. This should be bypassed by role event modules.
    event_modules: "demo_template,demo_csv_markdown,demo_json_pick"
    event_routes: |
      - when: event.type == "ChatRequestEvent"
        to: demo_csv_markdown

steps:
  - id: role_reply
    type: llm_call
    role: multiplex_role
