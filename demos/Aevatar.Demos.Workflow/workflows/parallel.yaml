name: parallel
description: |
  Demonstrates the `parallel` (parallel_fanout) primitive — fan-out to multiple workers.
  Sends the same prompt to 3 independent workers, then merges all responses.

roles:
  - id: worker_a
    name: "Worker A"
    system_prompt: |
      You are a pragmatic engineer. Answer concisely in 2-3 bullet points.

  - id: worker_b
    name: "Worker B"
    system_prompt: |
      You are a business strategist. Answer concisely in 2-3 bullet points.

  - id: worker_c
    name: "Worker C"
    system_prompt: |
      You are a DevOps specialist. Answer concisely in 2-3 bullet points.

steps:
  - id: brainstorm
    type: parallel
    parameters:
      workers: "worker_a,worker_b,worker_c"
