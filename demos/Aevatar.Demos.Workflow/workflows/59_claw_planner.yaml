name: 59_claw_planner
description: Planner generates URL lines and executes each line through OpenClaw screenshot sub-workflow.

roles:
  - id: planner
    name: Planner
    system_prompt: |
      Convert user intent into 1-3 concrete HTTPS URLs that should be inspected.
      Output one URL per line, no numbering, no explanation.

steps:
  - id: plan_urls
    type: llm_call
    role: planner
    parameters:
      prompt_prefix: "Return executable HTTPS URLs only, one per line:"
    on_error:
      strategy: fallback
      fallback_step: fallback_url_list
    next: emit_plan_receipt

  - id: fallback_url_list
    type: assign
    parameters:
      target: planned_urls
      value: "$input"
    next: emit_plan_receipt

  - id: emit_plan_receipt
    type: emit
    parameters:
      event_type: "openclaw.plan.generated"
    next: run_planned_urls

  - id: run_planned_urls
    type: foreach
    parameters:
      delimiter: "\n"
      sub_step_type: workflow_call
      sub_param_workflow: "64_claw_screenshot_from_url"
    on_error:
      strategy: fallback
      fallback_step: setup_guide
    next: summarize_execution

  - id: summarize_execution
    type: assign
    parameters:
      target: result
      value: "$input"
    next: finish

  - id: setup_guide
    type: assign
    parameters:
      target: result
      value: "Planner execution failed. Provide direct HTTPS URLs (one per line) and ensure 58_claw_ota_loop is healthy before retrying 59_claw_planner."
    next: finish

  - id: finish
    type: assign
    parameters:
      target: result
      value: "$input"
