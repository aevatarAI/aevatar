name: 47_mixed_human_approval_wait_signal
description: |
  Mixed manual interaction demo.
  human_approval passes first, then wait_signal pauses for external system callback.

roles: []

steps:
  - id: draft_operation_plan
    type: assign
    parameters:
      value: "Deploy cache cluster patch-7 and validate replication health."
    next: approval_gate

  - id: approval_gate
    type: human_approval
    parameters:
      prompt: "Approve cache cluster patch-7 rollout?"
      timeout: "600"
      on_reject: "fail"
    next: wait_ops_window

  - id: wait_ops_window
    type: wait_signal
    parameters:
      signal_name: "ops_window_open"
      prompt: "Send signal 'ops_window_open' when maintenance window starts."
      timeout_ms: "45000"
    next: closeout

  - id: closeout
    type: transform
    parameters:
      op: "lowercase"
