name: 44_wait_signal_manual_success
description: |
  wait_signal success demo.
  Workflow pauses until app/UI sends the expected signal payload.

roles: []

steps:
  - id: prepare_release_note
    type: assign
    parameters:
      value: "Release gate opened. Waiting for platform-ready signal."
    next: wait_for_platform_signal

  - id: wait_for_platform_signal
    type: wait_signal
    parameters:
      signal_name: "platform_ready"
      prompt: "Send signal 'platform_ready' when platform checks pass."
      timeout_ms: "60000"
    next: finalize_release

  - id: finalize_release
    type: transform
    parameters:
      op: "uppercase"
