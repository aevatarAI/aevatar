name: foreach_llm_alias
description: Demonstrates foreach_llm ergonomic alias (defaults sub_step_type=llm_call).

roles:
  - id: analyst
    name: Analyst
    system_prompt: Summarize each item in one concise sentence.

steps:
  - id: summarize_each_item
    type: foreach_llm
    target_role: analyst
    parameters:
      delimiter: "\n---\n"
      sub_param_prompt_prefix: "Summarize this item:"
