name: 29_role_event_module_top_level_overrides_extensions
description: |
  Precedence demo: top-level event_modules/event_routes override extensions.*
  when both are provided.
  Expected behavior: role uses demo_json_pick (top-level), not demo_template (extensions).

roles:
  - id: precedence_role
    name: Precedence Role
    system_prompt: |
      Fallback assistant. Should be bypassed by routed role event module.
    event_modules: "demo_json_pick"
    event_routes: |
      - when: event.type == "ChatRequestEvent"
        to: demo_json_pick
    extensions:
      event_modules: "demo_template"
      event_routes: |
        - when: event.type == "ChatRequestEvent"
          to: demo_template

steps:
  - id: role_reply
    type: llm_call
    role: precedence_role
