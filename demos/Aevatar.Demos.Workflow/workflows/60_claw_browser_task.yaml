name: 60_claw_browser_task
description: Browser state inspection template using openclaw_call directly.

steps:
  - id: derive_browser_profile
    type: assign
    parameters:
      target: browser_profile
      value: "${if(isBlank(session_id), 'openclaw', concat('openclaw-', session_id))}"
    next: probe_gateway_health

  - id: probe_gateway_health
    type: openclaw
    parameters:
      args: "gateway call health --json"
      timeout_ms: "15000"
    on_error:
      strategy: fallback
      fallback_step: setup_guide
    next: start_browser_profile

  - id: start_browser_profile
    type: openclaw
    parameters:
      args: "browser start --browser-profile ${browser_profile}"
      timeout_ms: "60000"
    on_error:
      strategy: fallback
      fallback_step: create_browser_profile
    next: open_target_url

  - id: create_browser_profile
    type: openclaw
    parameters:
      args: "browser create-profile --name ${browser_profile} --json"
      timeout_ms: "20000"
    on_error:
      strategy: fallback
      fallback_step: setup_guide
    next: start_browser_profile_retry

  - id: start_browser_profile_retry
    type: openclaw
    parameters:
      args: "browser start --browser-profile ${browser_profile}"
      timeout_ms: "60000"
    on_error:
      strategy: fallback
      fallback_step: setup_guide
    next: open_target_url

  - id: open_target_url
    type: openclaw
    parameters:
      args: "browser --browser-profile ${browser_profile} open ${input}"
      timeout_ms: "30000"
    on_error:
      strategy: fallback
      fallback_step: open_default_url
    next: capture_browser_state

  - id: open_default_url
    type: openclaw
    parameters:
      args: "browser --browser-profile ${browser_profile} open https://example.com"
      timeout_ms: "30000"
    on_error:
      strategy: fallback
      fallback_step: setup_guide
    next: capture_browser_state

  - id: capture_browser_state
    type: openclaw
    parameters:
      args: "browser snapshot --browser-profile ${browser_profile} --json"
      timeout_ms: "30000"
    on_error:
      strategy: fallback
      fallback_step: setup_guide
    next: capture_browser_screenshot

  - id: capture_browser_screenshot
    type: openclaw
    parameters:
      args: "browser screenshot --browser-profile ${browser_profile} --json"
      timeout_ms: "30000"
    on_error:
      strategy: fallback
      fallback_step: setup_guide
    next: finish

  - id: setup_guide
    type: assign
    parameters:
      target: result
      value: "Browser state inspection failed. Ensure OpenClaw runtime is ready and pass a valid URL input (for example: https://example.com), then retry 60_claw_browser_task."
    next: finish

  - id: finish
    type: assign
    parameters:
      target: result
      value: "$input"
