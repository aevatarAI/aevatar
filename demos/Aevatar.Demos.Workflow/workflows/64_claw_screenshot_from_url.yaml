name: 64_claw_screenshot_from_url
description: Open one URL and save screenshot artifact to ~/.aevatar/screenshot.

steps:
  - id: derive_browser_profile
    type: assign
    parameters:
      target: browser_profile
      value: "${if(isBlank(session_id), 'openclaw', concat('openclaw-', session_id))}"
    next: derive_screenshot_dir

  - id: derive_screenshot_dir
    type: assign
    parameters:
      target: screenshot_dir
      value: "${if(isBlank(session_id), '~/.aevatar/screenshot', concat('~/.aevatar/screenshot/', session_id))}"
    next: probe_gateway_health

  - id: probe_gateway_health
    type: openclaw
    parameters:
      args: "gateway call health --json"
      timeout_ms: "15000"
    on_error:
      strategy: fallback
      fallback_step: setup_guide
    next: start_browser_profile

  - id: start_browser_profile
    type: openclaw
    parameters:
      args: "browser start --browser-profile ${browser_profile}"
      timeout_ms: "45000"
    on_error:
      strategy: fallback
      fallback_step: create_browser_profile
    next: open_target_url

  - id: create_browser_profile
    type: openclaw
    parameters:
      args: "browser create-profile --name ${browser_profile} --json"
      timeout_ms: "20000"
    on_error:
      strategy: fallback
      fallback_step: setup_guide
    next: start_browser_profile_retry

  - id: start_browser_profile_retry
    type: openclaw
    parameters:
      args: "browser start --browser-profile ${browser_profile}"
      timeout_ms: "45000"
    on_error:
      strategy: fallback
      fallback_step: setup_guide
    next: open_target_url

  - id: open_target_url
    type: openclaw
    parameters:
      args: "browser --browser-profile ${browser_profile} open ${input}"
      timeout_ms: "30000"
    on_error:
      strategy: fallback
      fallback_step: open_default_url
    next: capture_and_save

  - id: open_default_url
    type: openclaw
    parameters:
      args: "browser --browser-profile ${browser_profile} open https://example.com"
      timeout_ms: "30000"
    on_error:
      strategy: fallback
      fallback_step: setup_guide
    next: capture_and_save

  - id: capture_and_save
    type: openclaw
    parameters:
      args: "browser screenshot --browser-profile ${browser_profile} --json"
      timeout_ms: "30000"
      save_media_to: "${screenshot_dir}"
    on_error:
      strategy: fallback
      fallback_step: setup_guide
    next: finish

  - id: setup_guide
    type: assign
    parameters:
      target: result
      value: "Screenshot capture failed. Ensure OpenClaw runtime is ready and pass one valid HTTPS URL input. Artifacts default to ~/.aevatar/screenshot, and use ~/.aevatar/screenshot/${session_id} when session_id is present."
    next: finish

  - id: finish
    type: assign
    parameters:
      target: result
      value: "$input"
