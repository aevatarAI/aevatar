name: cli_call_alias
description: Demonstrates ergonomic alias cli_call, normalized to connector_call at parse time.

roles:
  - id: operator
    name: Operator
    system_prompt: ""
    connectors:
      - demo_cli_dotnet

steps:
  - id: call_cli_alias
    type: cli_call
    role: operator
    parameters:
      connector: demo_cli_dotnet
      timeout_ms: "5000"
      retry: "1"
      on_missing: "fail"
      on_error: "fail"
