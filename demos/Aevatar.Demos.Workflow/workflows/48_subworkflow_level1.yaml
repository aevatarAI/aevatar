name: 48_subworkflow_level1
description: Level 1 sub-workflow calls level 2, then reverses line order.

steps:
  - id: call_level2
    type: workflow_call
    parameters:
      workflow: "48_subworkflow_level2"

  - id: reverse_lines_level1
    type: transform
    parameters:
      op: "reverse_lines"
