name: role_event_module_unknown_ignored_template
description: |
  Edge-case demo: event_modules contains an unknown module name.
  Unknown modules are ignored, while valid modules are still applied.

roles:
  - id: unknown_ignored_role
    name: Unknown Ignored Role
    system_prompt: |
      Fallback assistant. Should be bypassed by role event module.
    event_modules: "missing_demo_module,demo_template"
    event_routes: |
      - when: event.type == "ChatRequestEvent"
        to: demo_template

steps:
  - id: role_reply
    type: llm_call
    role: unknown_ignored_role
