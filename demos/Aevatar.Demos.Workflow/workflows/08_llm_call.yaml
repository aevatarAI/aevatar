name: 08_llm_call
description: |
  Demonstrates the `llm_call` primitive — single LLM invocation.
  Sends the user prompt to an assistant role and returns the response.

roles:
  - id: assistant
    name: Assistant
    system_prompt: |
      You are a concise technical assistant. Answer in 2-3 sentences.

steps:
  - id: answer
    type: llm_call
    role: assistant
