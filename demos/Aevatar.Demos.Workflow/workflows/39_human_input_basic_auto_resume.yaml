name: 39_human_input_basic_auto_resume
description: |
  Human input demo with auto resume in web demo runtime.
  Workflow pauses at human_input, receives auto user input, then continues.

roles: []

steps:
  - id: ask_for_details
    type: human_input
    parameters:
      prompt: "Please provide incident details for triage."
      variable: "incident_details"
      timeout: "120"
      on_timeout: "fail"
    next: normalize

  - id: normalize
    type: transform
    parameters:
      op: "uppercase"
