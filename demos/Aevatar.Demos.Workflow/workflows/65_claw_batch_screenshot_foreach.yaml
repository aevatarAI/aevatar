name: 65_claw_batch_screenshot_foreach
description: Batch screenshot workflow. Input should be newline-separated HTTPS URLs.

steps:
  - id: run_batch_screenshot
    type: foreach
    parameters:
      delimiter: "\n"
      sub_step_type: workflow_call
      sub_param_workflow: "64_claw_screenshot_from_url"
    on_error:
      strategy: fallback
      fallback_step: setup_guide
    next: finish

  - id: setup_guide
    type: assign
    parameters:
      target: result
      value: "Batch screenshot failed. Provide HTTPS URLs line by line, and verify 58_claw_ota_loop passes before retrying 65_claw_batch_screenshot_foreach."
    next: finish

  - id: finish
    type: assign
    parameters:
      target: result
      value: "$input"
