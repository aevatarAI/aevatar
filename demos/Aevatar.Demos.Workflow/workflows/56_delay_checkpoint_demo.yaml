name: 56_delay_checkpoint_demo
description: Demonstrates checkpoint + short delay in a deterministic flow.

steps:
  - id: normalize_input
    type: transform
    parameters:
      op: trim
    next: save_checkpoint

  - id: save_checkpoint
    type: checkpoint
    parameters:
      name: "before_delay"
    next: wait_briefly

  - id: wait_briefly
    type: delay
    parameters:
      duration_ms: "300"
    next: finalize

  - id: finalize
    type: assign
    parameters:
      target: result
      value: "$input"
