name: 68_claw_channel_entry
description: Channel-safe OpenClaw entry workflow with preflight, isolated runtime context, and lifecycle emits.

steps:
  - id: validate_channel_input
    type: guard
    parameters:
      check: "not_empty"
      on_fail: "branch"
      branch_target: invalid_input
    next: emit_channel_started

  - id: emit_channel_started
    type: emit
    parameters:
      event_type: "openclaw.channel.run.started"
    next: run_preflight

  - id: run_preflight
    type: workflow_call
    parameters:
      workflow: "58_claw_ota_loop"
    on_error:
      strategy: fallback
      fallback_step: setup_guide
    next: run_screenshot_task

  - id: run_screenshot_task
    type: workflow_call
    parameters:
      workflow: "64_claw_screenshot_from_url"
    on_error:
      strategy: fallback
      fallback_step: setup_guide
    next: emit_channel_completed

  - id: emit_channel_completed
    type: emit
    parameters:
      event_type: "openclaw.channel.run.completed"
    next: finish

  - id: invalid_input
    type: assign
    parameters:
      target: result
      value: "Channel request is empty. Provide one valid HTTPS URL as input."
    next: finish

  - id: setup_guide
    type: assign
    parameters:
      target: result
      value: "Channel run failed. Ensure OpenClaw runtime is ready (run 58_claw_ota_loop) and send one valid HTTPS URL."
    next: finish

  - id: finish
    type: assign
    parameters:
      target: result
      value: "$input"
