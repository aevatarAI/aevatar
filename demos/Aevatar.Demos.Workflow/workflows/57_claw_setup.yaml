name: 57_claw_setup
description: Quick OpenClaw gateway setup probe using openclaw_call only.

steps:
  - id: probe_gateway_status
    type: openclaw
    parameters:
      args: "gateway status --json"
      timeout_ms: "15000"
    on_error:
      strategy: fallback
      fallback_step: install_guide
    next: check_gateway_service_loaded

  - id: check_gateway_service_loaded
    type: conditional
    parameters:
      condition: "\"loaded\": true"
    branches:
      true: probe_gateway_health
      false: gateway_start_guide

  - id: probe_gateway_health
    type: openclaw
    parameters:
      args: "gateway call health --json"
      timeout_ms: "15000"
    on_error:
      strategy: fallback
      fallback_step: install_guide
    next: ready

  - id: ready
    type: assign
    parameters:
      target: result
      value: "OpenClaw gateway is ready. Continue with 58_claw_ota_loop or 62_claw_preflight_report."
    next: finish

  - id: install_guide
    type: assign
    parameters:
      target: result
      value: "OpenClaw gateway is not ready. Run once: openclaw gateway install && openclaw gateway start, then retry 57_claw_setup."
    next: finish

  - id: gateway_start_guide
    type: assign
    parameters:
      target: result
      value: "OpenClaw gateway service is not loaded yet. Run: openclaw gateway start, then retry 57_claw_setup."
    next: finish

  - id: finish
    type: assign
    parameters:
      target: result
      value: "$input"
