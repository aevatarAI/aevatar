name: 21_role_event_module_csv_markdown
description: |
  Role-level event module demo.
  The role uses demo_csv_markdown to convert CSV ChatRequest input into markdown table
  and returns deterministic ChatResponseEvent without calling LLM.

roles:
  - id: csv_role
    name: CSV Role
    system_prompt: |
      You are a fallback assistant. This should be bypassed by role event modules.
    event_modules: "demo_csv_markdown"
    event_routes: |
      - when: event.type == "ChatRequestEvent"
        to: demo_csv_markdown

steps:
  - id: role_reply
    type: llm_call
    role: csv_role
