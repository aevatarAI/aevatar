name: 02_guard
description: |
  Demonstrates the `guard` primitive — input validation / assertion.
  Validates that input is non-empty, valid JSON, and contains an email field.

roles: []

steps:
  - id: check_not_empty
    type: guard
    parameters:
      check: "not_empty"
      on_fail: "fail"
    next: check_json

  - id: check_json
    type: guard
    parameters:
      check: "json_valid"
      on_fail: "fail"
    next: check_email

  - id: check_email
    type: guard
    parameters:
      check: "contains"
      keyword: "@"
      on_fail: "fail"
