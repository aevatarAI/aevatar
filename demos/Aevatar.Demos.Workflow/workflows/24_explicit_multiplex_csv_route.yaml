name: 24_explicit_multiplex_csv_route
description: |
  Replaces old 24_role_event_module_multiplex_csv.
  Routing to the CSV formatter is written as an explicit switch branch.

steps:
  - id: choose_route
    type: switch
    branches:
      template: render_template
      "service,error_rate,latency_ms": render_csv_markdown
      '{"incident"': extract_owner_team
      _default: render_template

  - id: render_template
    type: demo_template
    parameters:
      template: "Template multiplex route: {{input}}"
    next: finish

  - id: render_csv_markdown
    type: demo_csv_markdown
    parameters:
      delimiter: ","
      has_header: "true"
    next: finish

  - id: extract_owner_team
    type: demo_json_pick
    parameters:
      path: "incident.owner.team"
    next: finish

  - id: finish
    type: transform
    parameters:
      op: identity
