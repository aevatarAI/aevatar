name: llm_chain
description: |
  Demonstrates multi-step LLM chaining — sequential `llm_call` pipeline.
  Step 1: Analyst identifies key problems.
  Step 2: Advisor proposes solutions based on the analysis.

roles:
  - id: analyst
    name: Analyst
    system_prompt: |
      You are a systems analyst. Identify the top 3 challenges in the given topic.
      Be concise — use bullet points, max 2 sentences each.

  - id: advisor
    name: Advisor
    system_prompt: |
      You are a solutions architect. Given a list of challenges, propose a
      practical solution for each. Be concise — one paragraph per challenge.

steps:
  - id: analyze
    type: llm_call
    role: analyst
    next: propose

  - id: propose
    type: llm_call
    role: advisor
