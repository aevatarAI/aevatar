name: 20_role_event_module_template
description: |
  Role-level event module demo.
  The role declares event_modules/event_routes and intercepts ChatRequestEvent
  with demo_template before default RoleGAgent LLM handling.

roles:
  - id: template_role
    name: Template Role
    system_prompt: |
      You are a fallback assistant. This should be bypassed by role event modules.
    event_modules: "demo_template"
    event_routes: |
      - when: event.type == "ChatRequestEvent"
        to: demo_template

steps:
  - id: role_reply
    type: llm_call
    role: template_role
