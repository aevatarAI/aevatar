name: race
description: |
  Demonstrates the `race` primitive — first-wins parallel execution.
  Dispatches the same prompt to 3 workers; the first successful response wins.

roles:
  - id: fast_a
    name: "Racer A"
    system_prompt: |
      Answer in exactly one sentence. Be precise and technical.

  - id: fast_b
    name: "Racer B"
    system_prompt: |
      Answer in exactly one sentence. Use a real-world analogy.

  - id: fast_c
    name: "Racer C"
    system_prompt: |
      Answer in exactly one sentence. Keep it simple for beginners.

steps:
  - id: race_answer
    type: race
    parameters:
      workers: "fast_a,fast_b,fast_c"
