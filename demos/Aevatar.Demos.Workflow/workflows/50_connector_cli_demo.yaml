name: 50_connector_cli_demo
description: Demonstrates connector_call with role-level connector allowlist via a local CLI connector.

roles:
  - id: operator
    name: Operator
    system_prompt: ""
    connectors:
      - demo_cli_dotnet

steps:
  - id: capture_input
    type: assign
    parameters:
      target: original_input
      value: "$input"
    next: run_connector

  - id: run_connector
    type: connector_call
    role: operator
    parameters:
      connector: demo_cli_dotnet
      timeout_ms: "5000"
      retry: "1"
      on_missing: "fail"
      on_error: "fail"
