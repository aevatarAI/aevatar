name: 01_transform
description: |
  Demonstrates the `transform` primitive — pure deterministic text transformations.
  Pipeline: input → uppercase → count lines → output.

roles: []

steps:
  - id: to_upper
    type: transform
    parameters:
      op: "uppercase"
    next: count

  - id: count
    type: transform
    parameters:
      op: "count"
