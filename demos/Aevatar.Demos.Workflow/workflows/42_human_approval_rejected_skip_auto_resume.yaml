name: 42_human_approval_rejected_skip_auto_resume
description: |
  Human approval demo (auto rejected + skip path).
  Prompt contains AUTO_REJECT marker so web demo auto resume rejects approval.
  With on_reject=skip, workflow continues to next step.

roles: []

steps:
  - id: prepare_action
    type: assign
    parameters:
      value: "Restart read replica cluster."
    next: approval_gate

  - id: approval_gate
    type: human_approval
    parameters:
      prompt: "AUTO_REJECT: Approve restart operation?"
      timeout: "120"
      on_reject: "skip"
    next: continue_after_reject

  - id: continue_after_reject
    type: transform
    parameters:
      op: "lowercase"
