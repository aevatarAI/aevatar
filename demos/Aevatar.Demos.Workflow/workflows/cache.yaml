name: cache
description: |
  Demonstrates the `cache` primitive — caching LLM call results.
  Wraps an LLM call with a cache layer. On cache hit, returns immediately
  without invoking the LLM. TTL is set to 300 seconds for the demo.

roles:
  - id: assistant
    name: Assistant
    system_prompt: |
      You are a database expert. Answer concisely in 2-3 sentences.

steps:
  - id: cached_answer
    type: cache
    role: assistant
    parameters:
      cache_key: "sql_vs_nosql"
      ttl_seconds: "300"
      child_step_type: "llm_call"
      child_target_role: "assistant"
