name: 22_role_event_module_json_pick
description: |
  Role-level event module demo.
  The role uses demo_json_pick to extract incident.owner.team from JSON chat input
  via event_modules/event_routes before RoleGAgent default LLM path.

roles:
  - id: json_role
    name: JSON Role
    system_prompt: |
      You are a fallback assistant. This should be bypassed by role event modules.
    event_modules: "demo_json_pick"
    event_routes: |
      - when: event.type == "ChatRequestEvent"
        to: demo_json_pick

steps:
  - id: role_reply
    type: llm_call
    role: json_role
