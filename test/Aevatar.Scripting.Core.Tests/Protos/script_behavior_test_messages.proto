syntax = "proto3";

package aevatar.scripting.tests;

option csharp_namespace = "Aevatar.Scripting.Core.Tests.Messages";

import "scripting_schema_options.proto";
import "scripting_runtime_options.proto";

message ScriptProfileState {
  int32 command_count = 1;
  string last_command_id = 2;
  string normalized_text = 3;
}

message ScriptProfileSearchIndex {
  string lookup_key = 1 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
  string sort_key = 2 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
}

message ScriptProfileDocumentRef {
  string actor_id = 1 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
  string policy_id = 2 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
}

message ScriptProfileReadModel {
  option (aevatar.scripting.schema.scripting_read_model) = {
    schema_id: "script_profile"
    schema_version: "3"
    store_kinds: "document"
    store_kinds: "graph"
    document_indexes: {
      name: "idx_actor_policy"
      paths: "actor_id"
      paths: "policy_id"
      unique: true
      provider: "document"
    }
    document_indexes: {
      name: "idx_lookup"
      paths: "search.lookup_key"
      provider: "document"
    }
    graph_relations: {
      name: "rel_policy"
      source_path: "refs.policy_id"
      target_schema_id: "policy"
      target_path: "policy_id"
      cardinality: "many_to_one"
      provider: "graph"
    }
  };
  bool has_value = 1;
  string actor_id = 2 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
  string policy_id = 3 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
  string last_command_id = 4 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
  string input_text = 5 [(aevatar.scripting.schema.scripting_field) = { storage_type: "text" }];
  string normalized_text = 6 [(aevatar.scripting.schema.scripting_field) = { storage_type: "text" }];
  repeated string tags = 7 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword", nullable: true }];
  ScriptProfileSearchIndex search = 8;
  ScriptProfileDocumentRef refs = 9;
}

message ScriptProfileUpdateCommand {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_COMMAND
    command_id_field: "command_id"
    correlation_id_field: "command_id"
  };
  string command_id = 1;
  string actor_id = 2;
  string policy_id = 3;
  string input_text = 4;
  repeated string tags = 5;
}

message ScriptProfileUpdated {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_DOMAIN_EVENT
    projectable: true
    replay_safe: true
    snapshot_candidate: true
    command_id_field: "command_id"
    correlation_id_field: "command_id"
    read_model_scope: "aevatar.scripting.tests.ScriptProfileReadModel"
  };
  string command_id = 1;
  ScriptProfileReadModel current = 2;
}

message ScriptProfileQueryRequested {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_QUERY_REQUEST
    read_model_scope: "aevatar.scripting.tests.ScriptProfileReadModel"
  };
  option (aevatar.scripting.runtime.scripting_query) = {
    result_full_name: "aevatar.scripting.tests.ScriptProfileQueryResponded"
  };
  string request_id = 1;
}

message ScriptProfileQueryResponded {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_QUERY_RESULT
    read_model_scope: "aevatar.scripting.tests.ScriptProfileReadModel"
  };
  string request_id = 1;
  ScriptProfileReadModel current = 2;
}

message UppercaseState {
  string value = 1;
}

message UppercaseReadModel {
  bool has_value = 1;
  string value = 2;
}

message UppercaseCommand {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_COMMAND
    command_id_field: "command_id"
    correlation_id_field: "command_id"
  };
  string command_id = 1;
  string input_text = 2;
}

message UppercaseSignal {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_INTERNAL_SIGNAL
    command_id_field: "signal_id"
    correlation_id_field: "signal_id"
  };
  string signal_id = 1;
}

message UppercaseCompleted {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_DOMAIN_EVENT
    projectable: true
    replay_safe: true
    snapshot_candidate: true
    command_id_field: "command_id"
    correlation_id_field: "command_id"
    read_model_scope: "aevatar.scripting.tests.UppercaseReadModel"
  };
  string command_id = 1;
  string value = 2;
}

message UppercaseQueryRequested {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_QUERY_REQUEST
    read_model_scope: "aevatar.scripting.tests.UppercaseReadModel"
  };
  option (aevatar.scripting.runtime.scripting_query) = {
    result_full_name: "aevatar.scripting.tests.UppercaseQueryResponded"
  };
  string request_id = 1;
}

message UppercaseQueryResponded {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_QUERY_RESULT
    read_model_scope: "aevatar.scripting.tests.UppercaseReadModel"
  };
  string request_id = 1;
  string value = 2;
}

message ClaimSearchIndex {
  string lookup_key = 1 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
  string decision_key = 2 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
}

message ClaimRefs {
  string policy_id = 1 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
  string owner_actor_id = 2 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
}

message ClaimState {
  string case_id = 1;
  string policy_id = 2;
  string decision_status = 3;
  bool manual_review_required = 4;
  string ai_summary = 5;
  double risk_score = 6;
  bool compliance_passed = 7;
  string last_command_id = 8;
  repeated string trace_steps = 9;
}

message ClaimReadModel {
  option (aevatar.scripting.schema.scripting_read_model) = {
    schema_id: "claim_case"
    schema_version: "3"
    store_kinds: "document"
    store_kinds: "graph"
    document_indexes: {
      name: "idx_case_policy"
      paths: "case_id"
      paths: "policy_id"
      unique: true
      provider: "document"
    }
    document_indexes: {
      name: "idx_decision"
      paths: "decision_status"
      provider: "document"
    }
    graph_relations: {
      name: "rel_policy"
      source_path: "refs.policy_id"
      target_schema_id: "policy"
      target_path: "policy_id"
      cardinality: "many_to_one"
      provider: "graph"
    }
  };
  bool has_value = 1;
  string case_id = 2 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
  string policy_id = 3 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
  string decision_status = 4 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
  bool manual_review_required = 5 [(aevatar.scripting.schema.scripting_field) = { storage_type: "boolean" }];
  string ai_summary = 6 [(aevatar.scripting.schema.scripting_field) = { storage_type: "text" }];
  double risk_score = 7;
  bool compliance_passed = 8;
  string last_command_id = 9 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
  ClaimSearchIndex search = 10;
  ClaimRefs refs = 11;
  repeated string trace_steps = 12 [(aevatar.scripting.schema.scripting_field) = { storage_type: "keyword", nullable: true }];
}

message ClaimSubmitted {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_COMMAND
    command_id_field: "command_id"
    correlation_id_field: "command_id"
    aggregate_id_field: "case_id"
  };
  string command_id = 1;
  string case_id = 2;
  double risk_score = 3;
  bool compliance_passed = 4;
  string policy_id = 5;
}

message ClaimDecisionRecorded {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_DOMAIN_EVENT
    projectable: true
    replay_safe: true
    snapshot_candidate: true
    command_id_field: "command_id"
    correlation_id_field: "command_id"
    read_model_scope: "aevatar.scripting.tests.ClaimReadModel"
  };
  string command_id = 1;
  ClaimReadModel current = 2;
}

message ClaimQueryRequested {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_QUERY_REQUEST
    read_model_scope: "aevatar.scripting.tests.ClaimReadModel"
  };
  option (aevatar.scripting.runtime.scripting_query) = {
    result_full_name: "aevatar.scripting.tests.ClaimQueryResponded"
  };
  string request_id = 1;
}

message ClaimQueryResponded {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_QUERY_RESULT
    read_model_scope: "aevatar.scripting.tests.ClaimReadModel"
  };
  string request_id = 1;
  ClaimReadModel current = 2;
}

message ClaimAnalystReviewRequested {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_COMMAND
    aggregate_id_field: "case_id"
