syntax = "proto3";

package aevatar.evolution;

option csharp_namespace = "Aevatar.Integration.Tests.Protocols";

import "scripting_schema_options.proto";
import "scripting_runtime_options.proto";

message ScriptOnlyEvolutionState {
  option (aevatar.scripting.schema.scripting_read_model) = {
    schema_id: "script_only_evolution"
    schema_version: "1"
    store_kinds: "document"
  };
  string temp_runtime_id = 1;
  string new_runtime_id = 2;
  string evolved_runtime_id = 3;
  string new_definition_actor_id = 4;
  string decision_status = 5;
}

message ScriptOnlyEvolutionRequested {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_COMMAND
  };
  string new_script_source = 1;
  string worker_v2_source = 2;
}

message ScriptOnlyEvolutionCompleted {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_DOMAIN_EVENT
    projectable: true
    replay_safe: true
    snapshot_candidate: true
    read_model_scope: "aevatar.evolution.ScriptOnlyEvolutionState"
  };
  ScriptOnlyEvolutionState current = 1;
}

message MultiScriptEvolutionState {
  option (aevatar.scripting.schema.scripting_read_model) = {
    schema_id: "multi_script_evolution"
    schema_version: "1"
    store_kinds: "document"
  };
  string lifecycle_actor_id = 1;
  string temp_a_runtime_id = 2;
  string temp_b_runtime_id = 3;
  string generated_runtime_id_1 = 4;
  string generated_runtime_id_2 = 5;
  string evolved_a_runtime_id = 6;
  string evolved_b_runtime_id = 7;
  string decision_a2 = 8;
  string decision_a3 = 9;
  string decision_b2 = 10;
  string decision_b3 = 11;
}

message MultiScriptEvolutionRequested {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_COMMAND
  };
  string worker_a_v2_source = 1;
  string worker_a_v3_source = 2;
  string worker_b_v2_source = 3;
  string worker_b_v3_source = 4;
  string generated_source_1 = 5;
  string generated_source_2 = 6;
  string runtime_agent_type = 7;
}

message MultiScriptEvolutionCompleted {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_DOMAIN_EVENT
    projectable: true
    replay_safe: true
    snapshot_candidate: true
    read_model_scope: "aevatar.evolution.MultiScriptEvolutionState"
  };
  MultiScriptEvolutionState current = 1;
}

