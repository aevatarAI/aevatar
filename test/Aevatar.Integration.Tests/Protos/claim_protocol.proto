syntax = "proto3";

package aevatar.claims;

option csharp_namespace = "Aevatar.Integration.Tests.Protocols";

message ClaimSearchIndex {
  string lookup_key = 1;
  string decision_key = 2;
}

message ClaimRefs {
  string policy_id = 1;
  string owner_actor_id = 2;
}

message ClaimCaseState {
  string case_id = 1;
  string policy_id = 2;
  string decision_status = 3;
  bool manual_review_required = 4;
  string ai_summary = 5;
  double risk_score = 6;
  bool compliance_passed = 7;
  string last_command_id = 8;
}

message ClaimCaseReadModel {
  bool has_value = 1;
  string case_id = 2;
  string policy_id = 3;
  string decision_status = 4;
  bool manual_review_required = 5;
  string ai_summary = 6;
  double risk_score = 7;
  bool compliance_passed = 8;
  string last_command_id = 9;
  ClaimSearchIndex search = 10;
  ClaimRefs refs = 11;
  repeated string trace_steps = 12;
}

message ClaimSubmitted {
  string command_id = 1;
  string case_id = 2;
  double risk_score = 3;
  bool compliance_passed = 4;
  string policy_id = 5;
}

message ClaimDecisionRecorded {
  string command_id = 1;
  ClaimCaseReadModel current = 2;
}

message ClaimQueryRequested {
  string request_id = 1;
  string reply_stream_id = 2;
}

message ClaimQueryResponded {
  string request_id = 1;
  ClaimCaseReadModel current = 2;
}

message ClaimAnalystReviewRequested {
  string case_id = 1;
}

message ClaimFraudScoringRequested {
  string case_id = 1;
}

message ClaimComplianceCheckRequested {
  string case_id = 1;
}

message ClaimManualReviewRequested {
  string case_id = 1;
}

message ClaimSinkState {
  repeated string message_types = 1;
}
