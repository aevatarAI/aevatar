services:
  garnet:
    image: ghcr.io/microsoft/garnet:latest
    command: ["--lua", "--bind", "0.0.0.0", "--port", "6379"]
    ports:
      - "6379:6379"

  sisyphus-host:
    build:
      context: ../..
      dockerfile: apps/sisyphus/Dockerfile
    depends_on:
      - garnet
    restart: on-failure
    ports:
      - "5200:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AEVATAR_HOME=/app/config
      - ActorRuntime__Provider=Orleans
      - ActorRuntime__OrleansPersistenceBackend=Garnet
      - ActorRuntime__OrleansGarnetConnectionString=garnet:6379
      # Graph UUIDs for read/write operations
      - Sisyphus__Graph__ReadGraphId=${SISYPHUS_READ_GRAPH_ID}
      - Sisyphus__Graph__WriteGraphId=${SISYPHUS_WRITE_GRAPH_ID}
      # DeepSeek LLM
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      # MCP connector env vars (consumed by connectors.json ${} placeholders)
      - NYXID_MCP_URL=${NYXID_MCP_URL}
      - NYXID_AUTH_TOKEN_URL=${NYXID_AUTH_TOKEN_URL}
      - NYXID_SA_CLIENT_ID=${NYXID_SA_CLIENT_ID}
      - NYXID_SA_CLIENT_SECRET=${NYXID_SA_CLIENT_SECRET}

  frontend:
    build:
      context: frontend
    depends_on:
      - sisyphus-host
    ports:
      - "5174:80"
