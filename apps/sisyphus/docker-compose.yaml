services:
  sisyphus-host:
    build: .
    ports:
      - "5200:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ActorRuntime__Provider=Orleans
      - ActorRuntime__OrleansPersistenceBackend=Garnet
      - ActorRuntime__OrleansGarnetConnectionString=garnet:6379
      # NyxId (Session Manager REST proxy + MCP connector shared credentials)
      - NyxId__BaseUrl=${NYXID_BASE_URL}
      - NyxId__TokenUrl=${NYXID_AUTH_TOKEN_URL}
      - NyxId__ClientId=${NYXID_SA_CLIENT_ID}
      - NyxId__ClientSecret=${NYXID_SA_CLIENT_SECRET}
      - NyxId__ChronoGraphServiceId=${NYXID_CHRONO_GRAPH_SERVICE_ID}
      # MCP connector env vars (consumed by connectors.json ${} placeholders)
      - NYXID_MCP_URL=${NYXID_MCP_URL}
      - NYXID_AUTH_TOKEN_URL=${NYXID_AUTH_TOKEN_URL}
      - NYXID_SA_CLIENT_ID=${NYXID_SA_CLIENT_ID}
      - NYXID_SA_CLIENT_SECRET=${NYXID_SA_CLIENT_SECRET}
    depends_on:
      - garnet

  garnet:
    image: ghcr.io/microsoft/garnet:1.0.45
    command: ["--bind", "0.0.0.0", "--password", "${GARNET_PASSWORD:-}"]
    ports:
      - "6379:6379"
