syntax = "proto3";

package aevatar.dynamicruntime;
option csharp_namespace = "Aevatar.DynamicRuntime.Abstractions";
import "google/protobuf/any.proto";

message ScriptImageCatalogState {
  string image_name = 1;
  map<string, string> tags = 2;
  repeated string digests = 3;
}

message ScriptComposeStackState {
  string stack_id = 1;
  string compose_spec_digest = 2;
  int64 desired_generation = 3;
  int64 observed_generation = 4;
  string reconcile_status = 5;
}

message ScriptComposeServiceState {
  string stack_id = 1;
  string service_name = 2;
  int32 replicas_desired = 3;
  int32 replicas_ready = 4;
  string service_mode = 5;
  string image_ref = 6;
}

message ScriptServiceDefinitionState {
  string service_id = 1;
  string version = 2;
  string status = 3;
  string script_code = 4;
  string entrypoint_type = 5;
  string service_mode = 6;
  repeated string public_endpoints = 7;
  repeated string event_subscriptions = 8;
  string capabilities_hash = 9;
  int64 updated_at_unix_ms = 10;
  google.protobuf.Any custom_state = 11;
}

message ScriptContainerState {
  string container_id = 1;
  string stack_id = 2;
  string service_name = 3;
  string image_digest = 4;
  string status = 5;
  string role_actor_id = 6;
}

message ScriptRunState {
  string run_id = 1;
  string container_id = 2;
  string status = 3;
  string result = 4;
  string error = 5;
}

message ScriptBuildJobState {
  string build_job_id = 1;
  string stack_id = 2;
  string service_name = 3;
  string source_bundle_digest = 4;
  string result_image_digest = 5;
  string status = 6;
  string build_plan_digest = 7;
  string policy_decision = 8;
  bool requires_manual_approval = 9;
  string requested_by_agent_id = 10;
}

message ScriptRoleContainerState {
  string service_id = 1;
  string version = 2;
  string image_digest = 3;
  string entrypoint_type = 4;
  string capabilities_hash = 5;
}

message ScriptImagePublishedEvent {
  string image_name = 1;
  string tag = 2;
  string digest = 3;
}

message ScriptComposeAppliedEvent {
  string stack_id = 1;
  string compose_spec_digest = 2;
  int64 desired_generation = 3;
}

message ScriptComposeConvergedEvent {
  string stack_id = 1;
  int64 observed_generation = 2;
}

message ScriptComposeServiceScaledEvent {
  string stack_id = 1;
  string service_name = 2;
  int32 replicas_desired = 3;
  string service_mode = 4;
  string image_ref = 5;
}

message ScriptComposeServiceRolledOutEvent {
  string stack_id = 1;
  string service_name = 2;
  string image_ref = 3;
  int64 generation = 4;
}

message ScriptComposeServiceDependencyBlockedEvent {
  string stack_id = 1;
  string service_name = 2;
  string dependency_service_name = 3;
}

message ScriptContainerCreatedEvent {
  string container_id = 1;
  string stack_id = 2;
  string service_name = 3;
  string image_digest = 4;
  string role_actor_id = 5;
}

message ScriptContainerStartedEvent { string container_id = 1; }
message ScriptContainerStoppedEvent { string container_id = 1; }
message ScriptContainerDestroyedEvent { string container_id = 1; }

message ScriptServiceRegisteredEvent {
  string service_id = 1;
  string version = 2;
  string script_code = 3;
  string entrypoint_type = 4;
  string service_mode = 5;
  repeated string public_endpoints = 6;
  repeated string event_subscriptions = 7;
  string capabilities_hash = 8;
  int64 updated_at_unix_ms = 9;
}

message ScriptServiceUpdatedEvent {
  string service_id = 1;
  string version = 2;
  string script_code = 3;
  string entrypoint_type = 4;
  string service_mode = 5;
  repeated string public_endpoints = 6;
  repeated string event_subscriptions = 7;
  string capabilities_hash = 8;
  int64 updated_at_unix_ms = 9;
}

message ScriptServiceActivatedEvent {
  string service_id = 1;
  int64 updated_at_unix_ms = 2;
}

message ScriptServiceDeactivatedEvent {
  string service_id = 1;
  int64 updated_at_unix_ms = 2;
}

message ScriptRunStartedEvent {
  string run_id = 1;
  string container_id = 2;
}

message ScriptRunCompletedEvent {
  string run_id = 1;
  string result = 2;
}

message ScriptRunFailedEvent {
  string run_id = 1;
  string error = 2;
}

message ScriptRunCanceledEvent {
  string run_id = 1;
  string reason = 2;
}

message ScriptRunTimedOutEvent {
  string run_id = 1;
  string reason = 2;
}

message ScriptCustomStateUpdatedEvent {
  string service_id = 1;
  string run_id = 2;
  google.protobuf.Any custom_state = 3;
}

message ScriptReadModelDefinedEvent {
  string service_id = 1;
  string run_id = 2;
  string read_model_name = 3;
  string key_field = 4;
  map<string, string> fields = 5;
  repeated string indexes = 6;
}

message ScriptReadModelRelationDefinedEvent {
  string service_id = 1;
  string run_id = 2;
  string relation_name = 3;
  string from_read_model = 4;
  string to_read_model = 5;
  string from_key_field = 6;
  string to_key_field = 7;
}

message ScriptReadModelDocumentUpsertedEvent {
  string service_id = 1;
  string run_id = 2;
  string read_model_name = 3;
  string document_id = 4;
  google.protobuf.Any document = 5;
  map<string, google.protobuf.Any> index_values = 6;
}

message ScriptBuildPlanSubmittedEvent {
  string build_job_id = 1;
  string stack_id = 2;
  string service_name = 3;
  string source_bundle_digest = 4;
}

message ScriptBuildPolicyValidatedEvent {
  string build_job_id = 1;
  string policy_decision = 2;
  bool requires_manual_approval = 3;
}

message ScriptBuildApprovedEvent { string build_job_id = 1; }

message ScriptBuildPublishedEvent {
  string build_job_id = 1;
  string result_image_digest = 2;
}

message ScriptBuildRolledBackEvent { string build_job_id = 1; }

message ConfigureScriptRoleCapabilitiesEvent {
  string service_id = 1;
  string version = 2;
  string image_digest = 3;
  string entrypoint_type = 4;
  string capabilities_hash = 5;
}
