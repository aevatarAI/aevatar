syntax = "proto3";

package aevatar.gagentservice;

option csharp_namespace = "Aevatar.GAgentService.Abstractions";

import "google/protobuf/timestamp.proto";
import "service_endpoint.proto";

message ServicePackageFile {
  string path = 1;
  string content = 2;
}

message ServiceSourcePackageSpec {
  repeated ServicePackageFile csharp_sources = 1;
  repeated ServicePackageFile proto_files = 2;
  string entry_behavior_type_name = 3;
  string entry_source_path = 4;
}

enum ServiceImplementationKind {
  SERVICE_IMPLEMENTATION_KIND_UNSPECIFIED = 0;
  SERVICE_IMPLEMENTATION_KIND_STATIC = 1;
  SERVICE_IMPLEMENTATION_KIND_SCRIPTING = 2;
  SERVICE_IMPLEMENTATION_KIND_WORKFLOW = 3;
}

enum ServiceRevisionStatus {
  SERVICE_REVISION_STATUS_UNSPECIFIED = 0;
  SERVICE_REVISION_STATUS_CREATED = 1;
  SERVICE_REVISION_STATUS_PREPARED = 2;
  SERVICE_REVISION_STATUS_PREPARATION_FAILED = 3;
  SERVICE_REVISION_STATUS_PUBLISHED = 4;
  SERVICE_REVISION_STATUS_RETIRED = 5;
}

message StaticServiceRevisionSpec {
  string actor_type_name = 1;
  repeated ServiceEndpointDescriptor endpoints = 2;
  string preferred_actor_id = 3;
}

message ScriptingServiceRevisionSpec {
  string script_id = 1;
  string revision = 2;
  string definition_actor_id = 3;
  string source_hash = 4;
  ServiceSourcePackageSpec package_spec = 5;
}

message WorkflowServiceRevisionSpec {
  string workflow_name = 1;
  string workflow_yaml = 2;
  string definition_actor_id = 3;
  map<string, string> inline_workflow_yamls = 4;
}

message ServiceRevisionSpec {
  ServiceIdentity identity = 1;
  string revision_id = 2;
  ServiceImplementationKind implementation_kind = 3;

  oneof implementation_spec {
    StaticServiceRevisionSpec static_spec = 10;
    ScriptingServiceRevisionSpec scripting_spec = 11;
    WorkflowServiceRevisionSpec workflow_spec = 12;
  }
}

message ServiceRevisionRecordState {
  ServiceRevisionSpec spec = 1;
  ServiceRevisionStatus status = 2;
  string artifact_hash = 3;
  repeated ServiceEndpointDescriptor endpoints = 4;
  string failure_reason = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp prepared_at = 7;
  google.protobuf.Timestamp published_at = 8;
  google.protobuf.Timestamp retired_at = 9;
}

message ServiceRevisionCatalogState {
  ServiceIdentity identity = 1;
  map<string, ServiceRevisionRecordState> revisions = 2;
  int64 last_applied_event_version = 3;
  string last_event_id = 4;
}

message CreateServiceRevisionCommand {
  ServiceRevisionSpec spec = 1;
}

message PrepareServiceRevisionCommand {
  ServiceIdentity identity = 1;
  string revision_id = 2;
}

message PublishServiceRevisionCommand {
  ServiceIdentity identity = 1;
  string revision_id = 2;
}

message RetireServiceRevisionCommand {
  ServiceIdentity identity = 1;
  string revision_id = 2;
}

message ServiceRevisionCreatedEvent {
  ServiceRevisionSpec spec = 1;
  google.protobuf.Timestamp created_at = 2;
}

message ServiceRevisionPreparedEvent {
  ServiceIdentity identity = 1;
  string revision_id = 2;
  ServiceImplementationKind implementation_kind = 3;
  string artifact_hash = 4;
  repeated ServiceEndpointDescriptor endpoints = 5;
  google.protobuf.Timestamp prepared_at = 6;
}

message ServiceRevisionPreparationFailedEvent {
  ServiceIdentity identity = 1;
  string revision_id = 2;
  string failure_reason = 3;
  google.protobuf.Timestamp occurred_at = 4;
}

message ServiceRevisionPublishedEvent {
  ServiceIdentity identity = 1;
  string revision_id = 2;
  google.protobuf.Timestamp published_at = 3;
}

message ServiceRevisionRetiredEvent {
  ServiceIdentity identity = 1;
  string revision_id = 2;
  google.protobuf.Timestamp retired_at = 3;
}
