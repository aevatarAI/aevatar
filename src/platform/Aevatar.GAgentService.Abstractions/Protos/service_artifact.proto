syntax = "proto3";

package aevatar.gagentservice;

option csharp_namespace = "Aevatar.GAgentService.Abstractions";

import "service_endpoint.proto";
import "service_revision.proto";

message StaticServiceDeploymentPlan {
  string actor_type_name = 1;
  string preferred_actor_id = 2;
}

message ScriptingServiceDeploymentPlan {
  string script_id = 1;
  string revision = 2;
  string definition_actor_id = 3;
  string source_hash = 4;
  ServiceSourcePackageSpec package_spec = 5;
}

message WorkflowServiceDeploymentPlan {
  string workflow_name = 1;
  string workflow_yaml = 2;
  string definition_actor_id = 3;
  map<string, string> inline_workflow_yamls = 4;
}

message ServiceDeploymentPlan {
  oneof plan_spec {
    StaticServiceDeploymentPlan static_plan = 1;
    ScriptingServiceDeploymentPlan scripting_plan = 2;
    WorkflowServiceDeploymentPlan workflow_plan = 3;
  }
}

message PreparedServiceRevisionArtifact {
  ServiceIdentity identity = 1;
  string revision_id = 2;
  ServiceImplementationKind implementation_kind = 3;
  string artifact_hash = 4;
  repeated ServiceEndpointDescriptor endpoints = 5;
  ServiceDeploymentPlan deployment_plan = 6;
  bytes protocol_descriptor_set = 7;
}

message PrepareServiceRevisionRequest {
  string service_key = 1;
  ServiceRevisionSpec spec = 2;
}
