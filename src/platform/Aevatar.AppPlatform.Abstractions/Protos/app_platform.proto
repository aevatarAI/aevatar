syntax = "proto3";

package aevatar.appplatform;

option csharp_namespace = "Aevatar.AppPlatform.Abstractions";

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

enum AppVisibility {
  APP_VISIBILITY_UNSPECIFIED = 0;
  APP_VISIBILITY_PRIVATE = 1;
  APP_VISIBILITY_PUBLIC = 2;
}

enum AppReleaseStatus {
  APP_RELEASE_STATUS_UNSPECIFIED = 0;
  APP_RELEASE_STATUS_DRAFT = 1;
  APP_RELEASE_STATUS_PUBLISHED = 2;
  APP_RELEASE_STATUS_ARCHIVED = 3;
}

enum AppImplementationKind {
  APP_IMPLEMENTATION_KIND_UNSPECIFIED = 0;
  APP_IMPLEMENTATION_KIND_STATIC = 1;
  APP_IMPLEMENTATION_KIND_SCRIPTING = 2;
  APP_IMPLEMENTATION_KIND_WORKFLOW = 3;
}

enum AppFunctionEndpointKind {
  APP_FUNCTION_ENDPOINT_KIND_UNSPECIFIED = 0;
  APP_FUNCTION_ENDPOINT_KIND_COMMAND = 1;
  APP_FUNCTION_ENDPOINT_KIND_CHAT = 2;
}

enum AppOperationKind {
  APP_OPERATION_KIND_UNSPECIFIED = 0;
  APP_OPERATION_KIND_FUNCTION_INVOKE = 1;
}

enum AppOperationStatus {
  APP_OPERATION_STATUS_UNSPECIFIED = 0;
  APP_OPERATION_STATUS_ACCEPTED = 1;
  APP_OPERATION_STATUS_RUNNING = 2;
  APP_OPERATION_STATUS_COMPLETED = 3;
  APP_OPERATION_STATUS_FAILED = 4;
  APP_OPERATION_STATUS_CANCELLED = 5;
}

enum AppServiceRole {
  APP_SERVICE_ROLE_UNSPECIFIED = 0;
  APP_SERVICE_ROLE_ENTRY = 1;
  APP_SERVICE_ROLE_COMPANION = 2;
  APP_SERVICE_ROLE_INTERNAL = 3;
}

message AppDefinitionSnapshot {
  string app_id = 1;
  string owner_scope_id = 2;
  string display_name = 3;
  string description = 4;
  AppVisibility visibility = 5;
  string default_release_id = 6;
  repeated string route_paths = 7;
}

message AppServiceRef {
  string tenant_id = 1;
  string app_id = 2;
  string namespace = 3;
  string service_id = 4;
  string revision_id = 5;
  AppImplementationKind implementation_kind = 6;
  AppServiceRole role = 7;
}

message AppEntryRef {
  string entry_id = 1;
  string service_id = 2;
  string endpoint_id = 3;
}

message AppConnectorRef {
  string resource_id = 1;
  string connector_name = 2;
}

message AppSecretRef {
  string resource_id = 1;
  string secret_name = 2;
}

message AppReleaseSnapshot {
  string release_id = 1;
  string app_id = 2;
  string display_name = 3;
  AppReleaseStatus status = 4;
  repeated AppServiceRef service_refs = 5;
  repeated AppEntryRef entry_refs = 6;
  repeated AppConnectorRef connector_refs = 7;
  repeated AppSecretRef secret_refs = 8;
}

message AppReleaseResourcesSnapshot {
  string app_id = 1;
  string release_id = 2;
  repeated AppConnectorRef connector_refs = 3;
  repeated AppSecretRef secret_refs = 4;
}

message AppRouteSnapshot {
  string route_path = 1;
  string app_id = 2;
  string release_id = 3;
  string entry_id = 4;
}

message AppResolvedEntryPoint {
  string entry_id = 1;
  string endpoint_id = 2;
  AppServiceRef service_ref = 3;
}

message AppRouteResolution {
  string route_path = 1;
  AppDefinitionSnapshot app = 2;
  AppReleaseSnapshot release = 3;
  AppResolvedEntryPoint entry = 4;
}

message AppFunctionDescriptor {
  string function_id = 1;
  string display_name = 2;
  string description = 3;
  string app_id = 4;
  string release_id = 5;
  string service_id = 6;
  string endpoint_id = 7;
  AppFunctionEndpointKind endpoint_kind = 8;
  string request_type_url = 9;
  string response_type_url = 10;
}

message AppFunctionCaller {
  string service_key = 1;
  string tenant_id = 2;
  string app_id = 3;
  string scope_id = 4;
  string session_id = 5;
}

message AppFunctionInvokeRequest {
  google.protobuf.Any payload = 1;
  string command_id = 2;
  string correlation_id = 3;
  AppFunctionCaller caller = 4;
}

message AppFunctionInvokeAcceptedReceipt {
  string app_id = 1;
  string release_id = 2;
  string function_id = 3;
  string service_id = 4;
  string endpoint_id = 5;
  string request_id = 6;
  string target_actor_id = 7;
  string command_id = 8;
  string correlation_id = 9;
  string operation_id = 10;
  string status_url = 11;
  string events_url = 12;
  string result_url = 13;
  string stream_url = 14;
}

message AppOperationSnapshot {
  string operation_id = 1;
  AppOperationKind kind = 2;
  AppOperationStatus status = 3;
  string app_id = 4;
  string release_id = 5;
  string function_id = 6;
  string service_id = 7;
  string endpoint_id = 8;
  string request_id = 9;
  string target_actor_id = 10;
  string command_id = 11;
  string correlation_id = 12;
  google.protobuf.Timestamp created_at = 13;
}

message AppOperationResult {
  string operation_id = 1;
  AppOperationStatus status = 2;
  string result_code = 3;
  string message = 4;
  google.protobuf.Any payload = 5;
  google.protobuf.Timestamp completed_at = 6;
}

message AppOperationEvent {
  string operation_id = 1;
  uint64 sequence = 2;
  AppOperationStatus status = 3;
  string event_code = 4;
  string message = 5;
  google.protobuf.Timestamp occurred_at = 6;
}

message AppOperationUpdate {
  string operation_id = 1;
  AppOperationStatus status = 2;
  string event_code = 3;
  string message = 4;
  google.protobuf.Timestamp occurred_at = 5;
  AppOperationResult result = 6;
}
