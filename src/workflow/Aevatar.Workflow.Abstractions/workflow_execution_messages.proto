syntax = "proto3";
package aevatar.workflow;
option csharp_namespace = "Aevatar.Workflow.Abstractions";

message StartWorkflowEvent    { string workflow_name = 1; string input = 2; map<string, string> parameters = 3; }
message ConfigureWorkflowEvent { string workflow_name = 1; string workflow_yaml = 2; }
message WorkflowCompletedEvent { string workflow_name = 1; bool success = 2; string output = 3; string error = 4; }
message StepRequestEvent      { string step_id = 1; string step_type = 2; string input = 3; string target_role = 4; map<string, string> parameters = 5; }
message StepCompletedEvent    { string step_id = 1; bool success = 2; string output = 3; string error = 4; string worker_id = 5; map<string, string> metadata = 6; }

message WaitingForSignalEvent { string step_id = 1; string signal_name = 2; string prompt = 3; int32 timeout_ms = 4; }
message SignalReceivedEvent   { string signal_name = 1; string payload = 2; }
