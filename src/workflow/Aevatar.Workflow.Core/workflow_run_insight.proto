syntax = "proto3";

package aevatar.workflow;

option csharp_namespace = "Aevatar.Workflow.Core";

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

message WorkflowRunInsightObservedEvent {
  string root_actor_id = 1;
  string workflow_name = 2;
  string command_id = 3;
  int64 state_version = 4;
  string source_event_id = 5;
  google.protobuf.Timestamp observed_at_utc = 6;
  string source_publisher_actor_id = 7;
  string observed_type = 8;
  google.protobuf.Any observed_payload = 9;
}

message WorkflowRunInsightTopologyCapturedEvent {
  string root_actor_id = 1;
  string workflow_name = 2;
  string command_id = 3;
  google.protobuf.Timestamp captured_at_utc = 4;
  repeated WorkflowRunInsightTopologyEdge topology_entries = 5;
}

message WorkflowRunInsightStoppedEvent {
  string root_actor_id = 1;
  string reason = 2;
  google.protobuf.Timestamp stopped_at_utc = 3;
}

enum WorkflowRunInsightCompletionStatus {
  WORKFLOW_RUN_INSIGHT_COMPLETION_STATUS_RUNNING = 0;
  WORKFLOW_RUN_INSIGHT_COMPLETION_STATUS_COMPLETED = 1;
  WORKFLOW_RUN_INSIGHT_COMPLETION_STATUS_TIMED_OUT = 2;
  WORKFLOW_RUN_INSIGHT_COMPLETION_STATUS_FAILED = 3;
  WORKFLOW_RUN_INSIGHT_COMPLETION_STATUS_STOPPED = 4;
  WORKFLOW_RUN_INSIGHT_COMPLETION_STATUS_NOT_FOUND = 5;
  WORKFLOW_RUN_INSIGHT_COMPLETION_STATUS_DISABLED = 6;
  WORKFLOW_RUN_INSIGHT_COMPLETION_STATUS_WAITING_FOR_SIGNAL = 7;
  WORKFLOW_RUN_INSIGHT_COMPLETION_STATUS_UNKNOWN = 99;
}

message WorkflowRunInsightState {
  string root_actor_id = 1;
  string command_id = 2;
  string workflow_name = 3;
  string report_version = 4;
  int32 completion_status_value = 5;
  int64 state_version = 6;
  string last_event_id = 7;
  google.protobuf.Timestamp created_at_utc_value = 8;
  google.protobuf.Timestamp updated_at_utc_value = 9;
  google.protobuf.Timestamp started_at_utc_value = 10;
  google.protobuf.Timestamp ended_at_utc_value = 11;
  google.protobuf.BoolValue success_wrapper = 12;
  string input = 13;
  string final_output = 14;
  string final_error = 15;
  repeated WorkflowRunInsightTopologyEdge topology_entries = 16;
  repeated WorkflowRunInsightStepTrace step_entries = 17;
  repeated WorkflowRunInsightRoleReply role_reply_entries = 18;
  repeated WorkflowRunInsightTimelineEvent timeline_entries = 19;
  WorkflowRunInsightSummary summary_value = 20;
}

message WorkflowRunInsightTopologyEdge {
  string parent = 1;
  string child = 2;
}

message WorkflowRunInsightStepTrace {
  string step_id = 1;
  string step_type = 2;
  string target_role = 3;
  google.protobuf.Timestamp requested_at_utc_value = 4;
  google.protobuf.Timestamp completed_at_utc_value = 5;
  google.protobuf.BoolValue success_wrapper = 6;
  string worker_id = 7;
  string output_preview = 8;
  string error = 9;
  map<string, string> request_parameters_map = 10;
  map<string, string> completion_annotations_map = 11;
  string next_step_id = 12;
  string branch_key = 13;
  string assigned_variable = 14;
  string assigned_value = 15;
  string suspension_type = 16;
  string suspension_prompt = 17;
  int32 suspension_timeout_seconds_value = 18;
  string requested_variable_name = 19;
}

message WorkflowRunInsightRoleReply {
  google.protobuf.Timestamp timestamp_utc_value = 1;
  string role_id = 2;
  string session_id = 3;
  string content = 4;
  int32 content_length = 5;
}

message WorkflowRunInsightTimelineEvent {
  google.protobuf.Timestamp timestamp_utc_value = 1;
  string stage = 2;
  string message = 3;
  string agent_id = 4;
  string step_id = 5;
  string step_type = 6;
  string event_type = 7;
  map<string, string> data_map = 8;
}

message WorkflowRunInsightSummary {
  int32 total_steps = 1;
  int32 requested_steps = 2;
  int32 completed_steps = 3;
  int32 role_reply_count = 4;
  map<string, int32> step_type_counts_map = 5;
}
