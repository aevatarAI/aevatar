syntax = "proto3";
package aevatar.cognitive;
option csharp_namespace = "Aevatar.Workflow.Core";

message StartWorkflowEvent    { string workflow_name = 1; string input = 2; map<string, string> parameters = 3; string command_id = 4; }
message WorkflowCompletedEvent { string workflow_name = 1; bool success = 2; string output = 3; string error = 4; }
message StepRequestEvent      { string step_id = 1; string step_type = 2; string input = 3; string target_role = 4; map<string, string> parameters = 5; }
message StepCompletedEvent    { string step_id = 1; bool success = 2; string output = 3; string error = 4; string worker_id = 5; map<string, string> metadata = 6; }
message WorkflowState         { string workflow_yaml = 1; string workflow_name = 2; int32 version = 3; bool compiled = 4; string compilation_error = 5; int32 total_executions = 6; int32 successful_executions = 7; int32 failed_executions = 8; }
