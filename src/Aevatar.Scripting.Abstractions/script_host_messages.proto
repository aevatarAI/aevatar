syntax = "proto3";

package aevatar.scripting;

option csharp_namespace = "Aevatar.Scripting.Abstractions";
import "google/protobuf/any.proto";
import "google/protobuf/struct.proto";

message ScriptPackageFile {
  string path = 1;
  string content = 2;
}

message ScriptPackageSpec {
  repeated ScriptPackageFile csharp_sources = 1;
  repeated ScriptPackageFile proto_files = 2;
  string entry_behavior_type_name = 3;
  string entry_source_path = 4;
}

message ScriptReadModelFieldSpec {
  string name = 1;
  string type = 2;
  string path = 3;
  bool nullable = 4;
}

message ScriptReadModelIndexSpec {
  string name = 1;
  repeated string paths = 2;
  bool unique = 3;
  string provider = 4;
}

message ScriptReadModelRelationSpec {
  string name = 1;
  string source_path = 2;
  string target_schema_id = 3;
  string target_path = 4;
  string cardinality = 5;
  string provider = 6;
}

message ScriptReadModelSchemaSpec {
  string schema_id = 1;
  string schema_version = 2;
  repeated ScriptReadModelFieldSpec fields = 3;
  repeated ScriptReadModelIndexSpec indexes = 4;
  repeated ScriptReadModelRelationSpec relations = 5;
}

enum ScriptMessageKind {
  SCRIPT_MESSAGE_KIND_UNSPECIFIED = 0;
  SCRIPT_MESSAGE_KIND_COMMAND = 1;
  SCRIPT_MESSAGE_KIND_INTERNAL_SIGNAL = 2;
  SCRIPT_MESSAGE_KIND_DOMAIN_EVENT = 3;
  SCRIPT_MESSAGE_KIND_QUERY_REQUEST = 4;
  SCRIPT_MESSAGE_KIND_QUERY_RESULT = 5;
}

message ScriptMessageSemanticsSpec {
  string type_url = 1;
  string descriptor_full_name = 2;
  ScriptMessageKind kind = 3;
  bool projectable = 4;
  bool replay_safe = 5;
  bool snapshot_candidate = 6;
  string read_model_scope = 7;
  string aggregate_id_field = 8;
  string command_id_field = 9;
  string correlation_id_field = 10;
  string causation_id_field = 11;
}

message ScriptRuntimeSemanticsSpec {
  repeated ScriptMessageSemanticsSpec messages = 1;
}

message ScriptDefinitionState {
  string script_id = 1;
  string revision = 2;
  string source_text = 3;
  string source_hash = 4;
  int64 last_applied_event_version = 5;
  string last_event_id = 6;
  google.protobuf.Any read_model_schema = 7;
  string read_model_schema_hash = 8;
  string read_model_schema_version = 9;
  repeated string read_model_schema_store_kinds = 10;
  string read_model_schema_status = 11;
  string read_model_schema_failure_reason = 12;
  string state_type_url = 13;
  string read_model_type_url = 14;
  repeated string command_type_urls = 15;
  repeated string domain_event_type_urls = 16;
  repeated string internal_signal_type_urls = 17;
  ScriptPackageSpec script_package = 18;
  bytes protocol_descriptor_set = 19;
  string state_descriptor_full_name = 20;
  string read_model_descriptor_full_name = 21;
  ScriptRuntimeSemanticsSpec runtime_semantics = 22;
}

message ScriptBehaviorState {
  string definition_actor_id = 1;
  string script_id = 2;
  string revision = 3;
  string source_text = 4;
  string source_hash = 5;
  string state_type_url = 6;
  string read_model_type_url = 7;
  google.protobuf.Any state_root = 8;
  int64 last_applied_event_version = 9;
  string last_event_id = 10;
  string last_run_id = 11;
  string read_model_schema_version = 12;
  string read_model_schema_hash = 13;
  ScriptPackageSpec script_package = 14;
  bytes protocol_descriptor_set = 15;
  string state_descriptor_full_name = 16;
  string read_model_descriptor_full_name = 17;
  ScriptRuntimeSemanticsSpec runtime_semantics = 18;
}

message ScriptCatalogEntryState {
  string script_id = 1;
  string active_revision = 2;
  string active_definition_actor_id = 3;
  string active_source_hash = 4;
  string previous_revision = 5;
  repeated string revision_history = 6;
  string last_proposal_id = 7;
}

message ScriptCatalogState {
  map<string, ScriptCatalogEntryState> entries = 1;
  int64 last_applied_event_version = 2;
  string last_event_id = 3;
}

message ScriptEvolutionProposalState {
  string proposal_id = 1;
  string script_id = 2;
  string base_revision = 3;
  string candidate_revision = 4;
  string candidate_source_hash = 5;
  string status = 6;
  bool policy_allowed = 7;
  bool validation_succeeded = 8;
  repeated string validation_diagnostics = 9;
  string failure_reason = 10;
  string promoted_definition_actor_id = 11;
  string promoted_revision = 12;
  string reason = 13;
}

message ScriptEvolutionManagerState {
  map<string, ScriptEvolutionProposalState> proposals = 1;
  map<string, string> latest_proposal_by_script = 2;
  int64 last_applied_event_version = 3;
  string last_event_id = 4;
}

message ScriptEvolutionSessionState {
  string proposal_id = 1;
  string script_id = 2;
  string base_revision = 3;
  string candidate_revision = 4;
  bool completed = 5;
  bool accepted = 6;
  string status = 7;
  string failure_reason = 8;
  string definition_actor_id = 9;
  string catalog_actor_id = 10;
  repeated string diagnostics = 11;
  int64 last_applied_event_version = 12;
  string last_event_id = 13;
  string candidate_source_hash = 14;
  string reason = 15;
  bool policy_allowed = 16;
  bool validation_succeeded = 17;
  string candidate_source = 18;
}

message UpsertScriptDefinitionRequestedEvent {
  string script_id = 1;
  string script_revision = 2;
  string source_text = 3;
  string source_hash = 4;
  ScriptPackageSpec script_package = 5;
}

message ScriptDefinitionUpsertedEvent {
  string script_id = 1;
  string script_revision = 2;
  string source_text = 3;
  string source_hash = 4;
  google.protobuf.Any read_model_schema = 5;
  string read_model_schema_hash = 6;
  string read_model_schema_version = 7;
  repeated string read_model_schema_store_kinds = 8;
  string state_type_url = 9;
  string read_model_type_url = 10;
  repeated string command_type_urls = 11;
  repeated string domain_event_type_urls = 12;
  repeated string internal_signal_type_urls = 13;
  ScriptPackageSpec script_package = 14;
  bytes protocol_descriptor_set = 15;
  string state_descriptor_full_name = 16;
  string read_model_descriptor_full_name = 17;
  ScriptRuntimeSemanticsSpec runtime_semantics = 18;
}

message ScriptDefinitionBindingSpec {
  string script_id = 1;
  string revision = 2;
  string source_text = 3;
  string source_hash = 4;
  ScriptPackageSpec script_package = 5;
  string state_type_url = 6;
  string read_model_type_url = 7;
  string read_model_schema_version = 8;
  string read_model_schema_hash = 9;
  bytes protocol_descriptor_set = 10;
  string state_descriptor_full_name = 11;
  string read_model_descriptor_full_name = 12;
  ScriptRuntimeSemanticsSpec runtime_semantics = 13;
}

message ScriptReadModelSchemaDeclaredEvent {
  string script_id = 1;
  string script_revision = 2;
  google.protobuf.Any read_model_schema = 3;
  string read_model_schema_hash = 4;
  string read_model_schema_version = 5;
  repeated string read_model_schema_store_kinds = 6;
}

message ScriptReadModelSchemaValidatedEvent {
  string script_id = 1;
  string script_revision = 2;
  string read_model_schema_version = 3;
  repeated string validated_store_kinds = 4;
}

message ScriptReadModelSchemaActivationFailedEvent {
  string script_id = 1;
  string script_revision = 2;
  string read_model_schema_version = 3;
  string failure_reason = 4;
}

message RunScriptRequestedEvent {
  string run_id = 1;
  google.protobuf.Any input_payload = 2;
  string script_revision = 3;
  string definition_actor_id = 4;
  string requested_event_type = 5;
  string command_id = 6;
  string correlation_id = 7;
}

message BindScriptBehaviorRequestedEvent {
  string definition_actor_id = 1;
  string script_id = 2;
  string revision = 3;
  string source_text = 4;
  string source_hash = 5;
  string state_type_url = 6;
  string read_model_type_url = 7;
  string read_model_schema_version = 8;
  string read_model_schema_hash = 9;
  ScriptPackageSpec script_package = 10;
  bytes protocol_descriptor_set = 11;
  string state_descriptor_full_name = 12;
  string read_model_descriptor_full_name = 13;
  ScriptRuntimeSemanticsSpec runtime_semantics = 14;
}

message ScriptBehaviorBoundEvent {
  string definition_actor_id = 1;
  string script_id = 2;
  string revision = 3;
  string source_text = 4;
  string source_hash = 5;
  string state_type_url = 6;
  string read_model_type_url = 7;
  string read_model_schema_version = 8;
  string read_model_schema_hash = 9;
  ScriptPackageSpec script_package = 10;
  bytes protocol_descriptor_set = 11;
  string state_descriptor_full_name = 12;
  string read_model_descriptor_full_name = 13;
  ScriptRuntimeSemanticsSpec runtime_semantics = 14;
}

message ScriptNativeDocumentProjection {
  string schema_id = 1;
  string schema_version = 2;
  string schema_hash = 3;
  string document_index_scope = 4;
  google.protobuf.Struct fields_value = 5;
}

message ScriptNativeGraphNodeProjection {
  string node_id = 1;
  string node_type = 2;
  map<string, string> properties = 3;
}

message ScriptNativeGraphEdgeProjection {
  string edge_id = 1;
  string from_node_id = 2;
  string to_node_id = 3;
  string edge_type = 4;
  map<string, string> properties = 5;
}

message ScriptNativeGraphProjection {
  string schema_id = 1;
  string schema_version = 2;
  string schema_hash = 3;
  string graph_scope = 4;
  repeated ScriptNativeGraphNodeProjection node_entries = 5;
  repeated ScriptNativeGraphEdgeProjection edge_entries = 6;
}

message ScriptDomainFactCommitted {
  string actor_id = 1;
  string definition_actor_id = 2;
  string script_id = 3;
  string revision = 4;
  string run_id = 5;
  string command_id = 6;
  string correlation_id = 7;
  int64 event_sequence = 8;
  string event_type = 9;
  google.protobuf.Any domain_event_payload = 10;
  string state_type_url = 11;
  string read_model_type_url = 12;
  int64 state_version = 13;
  int64 occurred_at_unix_time_ms = 14;
  google.protobuf.Any read_model_payload = 15;
  ScriptNativeDocumentProjection native_document = 16;
  ScriptNativeGraphProjection native_graph = 17;
}

message ScriptBehaviorDispatchFailedEvent {
  string actor_id = 1;
  string script_id = 2;
  string definition_actor_id = 3;
  string script_revision = 4;
  string run_id = 5;
  string command_id = 6;
  string correlation_id = 7;
  string failure_reason = 8;
}

message StartScriptEvolutionSessionRequestedEvent {
  string proposal_id = 1;
  string script_id = 2;
  string base_revision = 3;
  string candidate_revision = 4;
  string candidate_source = 5;
  string candidate_source_hash = 6;
  string reason = 7;
}

message ProposeScriptEvolutionRequestedEvent {
  string proposal_id = 1;
  string script_id = 2;
  string base_revision = 3;
  string candidate_revision = 4;
  string candidate_source = 5;
  string candidate_source_hash = 6;
  string reason = 7;
  string callback_actor_id = 8;
  string callback_request_id = 9;
}

message PromoteScriptRevisionRequestedEvent {
  string script_id = 1;
  string revision = 2;
  string definition_actor_id = 3;
  string source_hash = 4;
  string proposal_id = 5;
  string expected_base_revision = 6;
}

message RollbackScriptRevisionRequestedEvent {
  string script_id = 1;
  string target_revision = 2;
  string reason = 3;
  string proposal_id = 4;
  string expected_current_revision = 5;
}

message ScriptEvolutionSessionStartedEvent {
  string proposal_id = 1;
  string script_id = 2;
  string base_revision = 3;
  string candidate_revision = 4;
  string candidate_source_hash = 5;
  string reason = 6;
  string candidate_source = 7;
}

message ScriptEvolutionSessionCompletedEvent {
  string proposal_id = 1;
  bool accepted = 2;
  string status = 3;
  string failure_reason = 4;
  string definition_actor_id = 5;
  string catalog_actor_id = 6;
  repeated string diagnostics = 7;
  ScriptDefinitionBindingSpec definition_snapshot = 8;
}

message ScriptEvolutionProposedEvent {
  string proposal_id = 1;
  string script_id = 2;
  string base_revision = 3;
  string candidate_revision = 4;
  string candidate_source_hash = 5;
  string reason = 6;
}

message ScriptEvolutionBuildRequestedEvent {
  string proposal_id = 1;
  string script_id = 2;
  string candidate_revision = 3;
}

message ScriptEvolutionExecutionRequestedEvent {
  string proposal_id = 1;
}

message ScriptEvolutionValidatedEvent {
  string proposal_id = 1;
  string script_id = 2;
  string candidate_revision = 3;
  bool is_valid = 4;
  repeated string diagnostics = 5;
}

message ScriptEvolutionRejectedEvent {
  string proposal_id = 1;
  string script_id = 2;
  string candidate_revision = 3;
  string failure_reason = 4;
  string status = 5;
}

message ScriptEvolutionPromotedEvent {
  string proposal_id = 1;
  string script_id = 2;
  string candidate_revision = 3;
  string definition_actor_id = 4;
  string catalog_actor_id = 5;
}

message ScriptEvolutionRollbackRequestedEvent {
  string proposal_id = 1;
  string script_id = 2;
  string target_revision = 3;
  string reason = 4;
  string catalog_actor_id = 5;
}

message ScriptEvolutionRolledBackEvent {
  string proposal_id = 1;
  string script_id = 2;
  string target_revision = 3;
  string previous_revision = 4;
  string catalog_actor_id = 5;
}

message ScriptCatalogRevisionPromotedEvent {
  string script_id = 1;
  string revision = 2;
  string definition_actor_id = 3;
  string source_hash = 4;
  string proposal_id = 5;
}

message ScriptCatalogRollbackRequestedEvent {
  string script_id = 1;
  string target_revision = 2;
  string reason = 3;
  string proposal_id = 4;
}

message ScriptCatalogRolledBackEvent {
  string script_id = 1;
  string target_revision = 2;
  string previous_revision = 3;
  string proposal_id = 4;
}
