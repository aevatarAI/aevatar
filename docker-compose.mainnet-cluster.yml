services:
  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: aevatar-mainnet-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 8
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_LOG_RETENTION_HOURS: 24
    volumes:
      - mainnet-kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:29092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  garnet:
    image: ghcr.io/microsoft/garnet:latest
    container_name: aevatar-mainnet-garnet
    command: ["--lua", "true"]
    ports:
      - "6379:6379"
    restart: unless-stopped

  mainnet-node1:
    build:
      context: .
      dockerfile: src/Aevatar.Mainnet.Host.Api/Dockerfile
    container_name: aevatar-mainnet-node1
    depends_on:
      kafka:
        condition: service_healthy
      garnet:
        condition: service_started
      elasticsearch:
        condition: service_started
      neo4j:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Distributed
      ASPNETCORE_URLS: http://+:8080
      AEVATAR_ActorRuntime__Provider: Orleans
      AEVATAR_ActorRuntime__OrleansStreamBackend: KafkaProvider
      AEVATAR_ActorRuntime__OrleansPersistenceBackend: Garnet
      AEVATAR_ActorRuntime__OrleansGarnetConnectionString: garnet:6379
      AEVATAR_ActorRuntime__KafkaBootstrapServers: kafka:29092
      AEVATAR_ActorRuntime__KafkaTopicName: aevatar-mainnet-agent-events
      AEVATAR_ActorRuntime__KafkaConsumerGroup: aevatar-mainnet-host-api
      AEVATAR_Orleans__ClusteringMode: Development
      AEVATAR_Orleans__ClusterId: aevatar-mainnet-cluster
      AEVATAR_Orleans__ServiceId: aevatar-mainnet-host-api
      AEVATAR_Orleans__SiloHost: mainnet-node1
      AEVATAR_Orleans__PrimarySiloEndpoint: mainnet-node1:11111
      AEVATAR_Orleans__SiloPort: 11111
      AEVATAR_Orleans__GatewayPort: 30000
      AEVATAR_Orleans__ListenOnAnyHostAddress: "true"
      AEVATAR_Orleans__QueueCount: 8
      AEVATAR_Orleans__QueueCacheSize: 4096
      Projection__Document__Providers__Elasticsearch__Enabled: "true"
      Projection__Document__Providers__Elasticsearch__Endpoints__0: http://elasticsearch:9200
      Projection__Document__Providers__Elasticsearch__IndexPrefix: aevatar-mainnet
      Projection__Document__Providers__InMemory__Enabled: "false"
      Projection__Graph__Providers__Neo4j__Enabled: "true"
      Projection__Graph__Providers__Neo4j__Uri: bolt://neo4j:7687
      Projection__Graph__Providers__Neo4j__Username: neo4j
      Projection__Graph__Providers__Neo4j__Password: ${NEO4J_PASSWORD}
      Projection__Graph__Providers__InMemory__Enabled: "false"
    ports:
      - "19081:8080"
    restart: unless-stopped

  mainnet-node2:
