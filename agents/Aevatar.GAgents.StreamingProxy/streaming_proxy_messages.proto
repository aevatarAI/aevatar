syntax = "proto3";
package aevatar.gagents.streamingproxy;
option csharp_namespace = "Aevatar.GAgents.StreamingProxy";

import "google/protobuf/timestamp.proto";
import "agent_messages.proto";

// ─── State ───

message StreamingProxyParticipant {
  string agent_id = 1;
  string display_name = 2;
  google.protobuf.Timestamp joined_at = 3;
}

message StreamingProxyChatMessage {
  int64 sequence = 1;
  string sender_agent_id = 2;
  string sender_name = 3;
  string content = 4;
  google.protobuf.Timestamp timestamp = 5;
  bool is_topic = 6;
}

message StreamingProxyGAgentState {
  string room_name = 1;
  repeated StreamingProxyParticipant participants = 2;
  repeated StreamingProxyChatMessage messages = 3;
  int64 next_sequence = 4;
  map<string, StreamingProxyChatSessionTerminalRecord> terminal_sessions = 5;
}

message StreamingProxyChatSessionTerminalRecord {
  string session_id = 1;
  StreamingProxyChatSessionTerminalStatus status = 2;
  google.protobuf.Timestamp terminal_at = 3;
  string error_message = 4;
}

// ─── Events ───

enum StreamingProxyChatSessionTerminalStatus {
  UNSPECIFIED = 0;
  COMPLETED = 1;
  FAILED = 2;
}

message GroupChatRoomInitializedEvent {
  string room_name = 1;
}

message GroupChatTopicEvent {
  string prompt = 1;
  string session_id = 2;
}

message GroupChatMessageEvent {
  string agent_id = 1;
  string agent_name = 2;
  string content = 3;
  string session_id = 4;
}

message GroupChatParticipantJoinedEvent {
  string agent_id = 1;
  string display_name = 2;
}

message GroupChatParticipantLeftEvent {
  string agent_id = 1;
}

message StreamingProxyChatSessionTerminalStateChanged {
  string session_id = 1;
  StreamingProxyChatSessionTerminalStatus status = 2;
  google.protobuf.Timestamp terminal_at = 3;
  string error_message = 4;
}

message StreamingProxyRoomSessionEnvelope {
  aevatar.EventEnvelope envelope = 1;
}

message StreamingProxyChatSessionTerminalSnapshot {
  string id = 1;
  string actor_id = 2;
  int64 state_version = 3;
  string last_event_id = 4;
  google.protobuf.Timestamp updated_at = 5;
  string root_actor_id = 6;
  string session_id = 7;
  StreamingProxyChatSessionTerminalStatus status = 8;
  google.protobuf.Timestamp terminal_at = 9;
  string error_message = 10;
}
