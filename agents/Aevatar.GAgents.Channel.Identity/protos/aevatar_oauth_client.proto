syntax = "proto3";

package aevatar.gagents.channel.identity;

option csharp_namespace = "Aevatar.GAgents.Channel.Identity";

import "google/protobuf/timestamp.proto";

// Cluster-singleton state for the aevatar host's own OAuth client registration
// against NyxID. Persisted by AevatarOAuthClientGAgent (well-known id
// "aevatar-oauth-client") so every silo in the cluster shares the same
// client_id and HMAC key — no appsettings, no secrets store, no per-host
// drift. See ADR-0017 §Implementation Notes #1 for the HMAC key invariant.
message AevatarOAuthClientState {
  // Opaque OAuth client_id returned by NyxID's RFC 7591 dynamic registration
  // endpoint. Empty when not yet provisioned.
  string client_id = 1;
  // UNIX seconds-since-epoch when NyxID issued the client registration.
  int64 client_id_issued_at_unix = 2;
  // HMAC key bytes used by StateTokenCodec to seal the OAuth state token.
  // Generated by the actor on first activation; rotated only by explicit
  // command (RotateHmacKeyCommand). Never leaves the cluster.
  bytes hmac_key = 3;
  // UNIX seconds-since-epoch when the HMAC key was last rotated.
  int64 hmac_key_rotated_at_unix = 4;
  // NyxID base URL the client_id was registered against. Stored so a future
  // change to the runtime authority is detected (the actor MUST re-provision
  // if the authority changes).
  string nyxid_authority = 5;
  // Whether the broker capability flag has been observed enabled on this
  // client at NyxID. Updated by the OAuth callback when token responses
  // include a binding_id (broker_capability_enabled=true on the NyxID side).
  bool broker_capability_observed = 6;
  // UNIX seconds-since-epoch of the last successful broker observation.
  int64 broker_capability_observed_at_unix = 7;
}

// Issued by the bootstrap startup service from every silo on cluster cold-
// boot. The actor's single-threaded handler turns the command into one DCR
// call (or a no-op when already provisioned) so racing silos cannot create
// duplicate OAuth clients at NyxID — see PR #521 review (codex/k2p6/v4-pro
// consensus on the cold-boot race).
message EnsureAevatarOAuthClientProvisionedCommand {
  string nyxid_authority = 1;
  string redirect_uri = 2;
  // Optional override for the DCR <c>client_name</c>; bootstrap leaves blank.
  string client_name = 3;
}

// Issued by tests / manual operator scripts that already hold a client_id
// (e.g. seeded fixture, post-rotation retag). Bootstrap NEVER uses this —
// it always sends EnsureAevatarOAuthClientProvisionedCommand instead so the
// actor mediates the DCR call.
message ProvisionAevatarOAuthClientCommand {
  string client_id = 1;
  int64 client_id_issued_at_unix = 2;
  string nyxid_authority = 3;
}

// Issued by ops to force a fresh HMAC key rotation. Old tokens signed with
// the previous key fail decode after the next provision; production rolls
// out via grace window.
message RotateAevatarOAuthClientHmacKeyCommand {}

// Issued by the OAuth callback handler when it observes binding_id in the
// token response — confirmation that NyxID admin has enabled
// broker_capability_enabled on this client.
message ObserveBrokerCapabilityCommand {}

// Persisted on successful provision. Carries the client_id + issuance
// timestamp + authority so the projector can materialize the readmodel.
message AevatarOAuthClientProvisionedEvent {
  string client_id = 1;
  int64 client_id_issued_at_unix = 2;
  string nyxid_authority = 3;
  google.protobuf.Timestamp persisted_at = 4;
}

// Persisted when the actor seeds or rotates its HMAC key.
message AevatarOAuthClientHmacKeyRotatedEvent {
  bytes hmac_key = 1;
  int64 rotated_at_unix = 2;
  google.protobuf.Timestamp persisted_at = 3;
}

// Persisted when the OAuth callback observes the broker capability for
// the first time after a provision (or after a re-provision against a new
// authority).
message AevatarOAuthClientBrokerCapabilityObservedEvent {
  int64 observed_at_unix = 1;
  google.protobuf.Timestamp persisted_at = 2;
}

// Read model: one document for the cluster-singleton AevatarOAuthClientGAgent.
// Backs IAevatarOAuthClientProvider.GetAsync. id == well-known actor id.
message AevatarOAuthClientDocument {
  string id = 1;
  int64 state_version = 2;
  string last_event_id = 3;
  google.protobuf.Timestamp updated_at_utc_value = 4;
  string client_id = 5;
  int64 client_id_issued_at_unix = 6;
  bytes hmac_key = 7;
  int64 hmac_key_rotated_at_unix = 8;
  string nyxid_authority = 9;
  bool broker_capability_observed = 10;
  int64 broker_capability_observed_at_unix = 11;
}
