syntax = "proto3";

package aevatar.gagents.channel.identity;

option csharp_namespace = "Aevatar.GAgents.Channel.Identity";

import "google/protobuf/timestamp.proto";

// Cluster-singleton state for the aevatar host's own OAuth client registration
// against NyxID. Persisted by AevatarOAuthClientGAgent (well-known id
// "aevatar-oauth-client") so every silo in the cluster shares the same
// client_id and HMAC key — no appsettings, no secrets store, no per-host
// drift. See ADR-0017 §Implementation Notes #1 for the HMAC key invariant.
message AevatarOAuthClientState {
  // Opaque OAuth client_id returned by NyxID's RFC 7591 dynamic registration
  // endpoint. Empty when not yet provisioned.
  string client_id = 1;
  // UNIX seconds-since-epoch when NyxID issued the client registration.
  int64 client_id_issued_at_unix = 2;
  // Current HMAC key bytes used by StateTokenCodec to seal the OAuth state
  // token. Generated by the actor on first activation; rotated by
  // RotateAevatarOAuthClientHmacKeyCommand. Never leaves the cluster.
  bytes hmac_key = 3;
  // UNIX seconds-since-epoch when the current HMAC key was generated.
  int64 hmac_key_rotated_at_unix = 4;
  // NyxID base URL the client_id was registered against. Stored so a future
  // change to the runtime authority is detected (the actor MUST re-provision
  // if the authority changes).
  string nyxid_authority = 5;
  // Whether the broker capability flag has been observed enabled on this
  // client at NyxID. Updated by the OAuth callback when token responses
  // include a binding_id (broker_capability_enabled=true on the NyxID side).
  bool broker_capability_observed = 6;
  // UNIX seconds-since-epoch of the last successful broker observation.
  int64 broker_capability_observed_at_unix = 7;
  // Current key id (e.g. "v1", "v2"). Carried in the state-token header so
  // verifiers can pick the right key during a rotation grace window.
  string hmac_kid = 8;
  // Previous HMAC key + kid kept for the grace window so a `state` token
  // signed by the prior key still verifies for state_token_lifetime after
  // rotation (PR #521 review v4-pro). Empty when no rotation has happened
  // since first provision.
  bytes previous_hmac_key = 9;
  string previous_hmac_kid = 10;
  // UNIX seconds-since-epoch when previous_hmac_key was demoted from current.
  // Verifiers must reject previous_hmac_key once now() > demoted_at +
  // state_token_lifetime so the previous-key window cannot persist past the
  // longest-lived in-flight state token.
  int64 previous_hmac_demoted_at_unix = 11;
  // Redirect URI registered with NyxID at DCR. Persisted so
  // HandleEnsureProvisioned can detect drift across redeploys (e.g.
  // operator sets AEVATAR_OAUTH_REDIRECT_BASE_URL after the cluster was
  // first bootstrapped against an internal listening URL) and re-register
  // the OAuth client; otherwise NyxID would keep the wrong callback target
  // forever. Empty when state predates the redirect-uri-tracking field.
  string redirect_uri = 12;
}

// Issued by the bootstrap startup service from every silo on cluster cold-
// boot. The actor's single-threaded handler turns the command into one DCR
// call (or a no-op when already provisioned) so racing silos cannot create
// duplicate OAuth clients at NyxID — see PR #521 review (codex/k2p6/v4-pro
// consensus on the cold-boot race).
message EnsureAevatarOAuthClientProvisionedCommand {
  string nyxid_authority = 1;
  string redirect_uri = 2;
  // Optional override for the DCR <c>client_name</c>; bootstrap leaves blank.
  string client_name = 3;
}

// Issued by tests / manual operator scripts that already hold a client_id
// (e.g. seeded fixture, post-rotation retag). Bootstrap NEVER uses this —
// it always sends EnsureAevatarOAuthClientProvisionedCommand instead so the
// actor mediates the DCR call.
message ProvisionAevatarOAuthClientCommand {
  string client_id = 1;
  int64 client_id_issued_at_unix = 2;
  string nyxid_authority = 3;
}

// Issued by ops to force a fresh HMAC key rotation. Old tokens signed with
// the previous key fail decode after the next provision; production rolls
// out via grace window.
message RotateAevatarOAuthClientHmacKeyCommand {}

// Issued by the OAuth callback handler when it observes binding_id in the
// token response — confirmation that NyxID admin has enabled
// broker_capability_enabled on this client.
message ObserveBrokerCapabilityCommand {}

// Persisted when bootstrap needs to re-emit the authoritative state root for
// the OAuth client projection without changing business state. This repairs a
// missing/stale readmodel after the projection scope is activated, while
// keeping rebuild semantics owned by the actor rather than query-time replay.
message AevatarOAuthClientProjectionRebuildRequestedEvent {
  string reason = 1;
  google.protobuf.Timestamp requested_at = 2;
}

// Persisted on successful provision. Carries the client_id + issuance
// timestamp + authority + redirect_uri so the projector can materialize
// the readmodel and so the actor can detect redirect-uri drift across
// redeploys.
message AevatarOAuthClientProvisionedEvent {
  string client_id = 1;
  int64 client_id_issued_at_unix = 2;
  string nyxid_authority = 3;
  google.protobuf.Timestamp persisted_at = 4;
  // Redirect URI registered with NyxID at this DCR call. Empty when an
  // older event predates the redirect-uri-tracking field; the actor
  // treats empty stored redirect_uri as "match anything" so legacy state
  // does not force a spurious re-DCR on first redeploy.
  string redirect_uri = 5;
}

// Persisted when the actor seeds or rotates its HMAC key. On rotation, the
// previous key + kid are demoted to the grace-window slot; on initial seed
// the previous_* fields are empty.
message AevatarOAuthClientHmacKeyRotatedEvent {
  bytes hmac_key = 1;
  int64 rotated_at_unix = 2;
  google.protobuf.Timestamp persisted_at = 3;
  string hmac_kid = 4;
  bytes previous_hmac_key = 5;
  string previous_hmac_kid = 6;
  int64 previous_hmac_demoted_at_unix = 7;
}

// Persisted when the OAuth callback observes the broker capability for
// the first time after a provision (or after a re-provision against a new
// authority).
message AevatarOAuthClientBrokerCapabilityObservedEvent {
  int64 observed_at_unix = 1;
  google.protobuf.Timestamp persisted_at = 2;
}

// Read model: one document for the cluster-singleton AevatarOAuthClientGAgent.
// Backs IAevatarOAuthClientProvider.GetAsync. id == well-known actor id.
//
// hmac_key + previous_hmac_key bytes mirror into the projection — see ADR-
// 0018 §Implementation Notes #1 for the explicit security tradeoff
// (state-token TTL ≤ 5 min, rotation command available, projection store
// access boundary equals actor event-store boundary). Production deployments
// MUST keep ES index `aevatar-oauth-client-*` access scoped to the same
// services that can read grain events.
message AevatarOAuthClientDocument {
  string id = 1;
  int64 state_version = 2;
  string last_event_id = 3;
  google.protobuf.Timestamp updated_at_utc_value = 4;
  string client_id = 5;
  int64 client_id_issued_at_unix = 6;
  bytes hmac_key = 7;
  int64 hmac_key_rotated_at_unix = 8;
  string nyxid_authority = 9;
  bool broker_capability_observed = 10;
  int64 broker_capability_observed_at_unix = 11;
  // Current key id; stays in sync with the actor's State.HmacKid. The codec
  // emits this as the kid header on outbound state tokens.
  string hmac_kid = 12;
  // Demoted previous key + kid kept for the rotation grace window so a
  // state token signed with the prior key still verifies for
  // state_token_lifetime after rotation (PR #521 review v4-pro on rotation).
  bytes previous_hmac_key = 13;
  string previous_hmac_kid = 14;
  // UNIX seconds when the previous key was demoted. Verifiers must reject it
  // once now() > demoted_at + state_token_lifetime so the previous-key
  // window cannot persist past the longest-lived in-flight state token.
  int64 previous_hmac_demoted_at_unix = 15;
  // Mirror of AevatarOAuthClientState.redirect_uri so the readmodel can
  // expose it for diagnostics (e.g. /api/oauth/aevatar-client/status) and
  // so an operator can confirm DCR registered the right callback target
  // without inspecting actor state directly.
  string redirect_uri = 16;
}
