syntax = "proto3";
package aevatar.gagents.studio_member;
option csharp_namespace = "Aevatar.GAgents.StudioMember";

import "google/protobuf/timestamp.proto";

// ─── Canonical enums ───
//
// StudioMember is the Studio's only first-class subject. workflow / script /
// gagent are implementation kinds for a member, not parallel member types.

enum StudioMemberImplementationKind {
  STUDIO_MEMBER_IMPLEMENTATION_KIND_UNSPECIFIED = 0;
  STUDIO_MEMBER_IMPLEMENTATION_KIND_WORKFLOW = 1;
  STUDIO_MEMBER_IMPLEMENTATION_KIND_SCRIPT = 2;
  STUDIO_MEMBER_IMPLEMENTATION_KIND_GAGENT = 3;
}

// Lifecycle stages mirror the Build/Bind/Invoke/Observe spec:
//   created      - member exists but has no implementation
//   build_ready  - implementation revision available, can bind
//   bind_ready   - bound to its publishedServiceId, can invoke
enum StudioMemberLifecycleStage {
  STUDIO_MEMBER_LIFECYCLE_STAGE_UNSPECIFIED = 0;
  STUDIO_MEMBER_LIFECYCLE_STAGE_CREATED = 1;
  STUDIO_MEMBER_LIFECYCLE_STAGE_BUILD_READY = 2;
  STUDIO_MEMBER_LIFECYCLE_STAGE_BIND_READY = 3;
}

enum StudioMemberBindingRunStatus {
  STUDIO_MEMBER_BINDING_RUN_STATUS_UNSPECIFIED = 0;
  STUDIO_MEMBER_BINDING_RUN_STATUS_ACCEPTED = 1;
  STUDIO_MEMBER_BINDING_RUN_STATUS_ADMISSION_PENDING = 2;
  STUDIO_MEMBER_BINDING_RUN_STATUS_ADMITTED = 3;
  STUDIO_MEMBER_BINDING_RUN_STATUS_PLATFORM_BINDING_PENDING = 4;
  STUDIO_MEMBER_BINDING_RUN_STATUS_SUCCEEDED = 5;
  STUDIO_MEMBER_BINDING_RUN_STATUS_FAILED = 6;
  STUDIO_MEMBER_BINDING_RUN_STATUS_REJECTED = 7;
}

// ─── Implementation refs ───
//
// Each implementation kind carries a typed sub-message rather than a generic
// metadata bag. Only one of these is populated at a time, matching
// implementation_kind on the parent state.

message StudioMemberWorkflowRef {
  string workflow_id = 1;
  string workflow_revision = 2;
}

message StudioMemberScriptRef {
  string script_id = 1;
  string script_revision = 2;
}

message StudioMemberGAgentRef {
  string actor_type_name = 1;
}

message StudioMemberImplementationRef {
  StudioMemberWorkflowRef workflow = 1;
  StudioMemberScriptRef script = 2;
  StudioMemberGAgentRef gagent = 3;
}

// ─── Last bound contract ───
//
// Record of the last successful Bind. publishedServiceId is the stable
// per-member service identity; revisionId is the most recently published
// implementation revision routed through that service.

message StudioMemberBindingContract {
  string published_service_id = 1;
  string revision_id = 2;
  StudioMemberImplementationKind implementation_kind = 3;
  google.protobuf.Timestamp bound_at_utc = 4;
}

message StudioMemberBindingFailure {
  string code = 1;
  string message = 2;
  google.protobuf.Timestamp failed_at_utc = 3;
}

message StudioMemberBindingAuthorityState {
  string current_binding_run_id = 1;
  StudioMemberBindingRunStatus current_status = 2;
  string last_terminal_binding_run_id = 3;
  StudioMemberBindingFailure last_failure = 4;
  google.protobuf.Timestamp updated_at_utc = 5;
}

message StudioMemberWorkflowBindingRequest {
  repeated string workflow_yamls = 1;
}

message StudioMemberScriptBindingRequest {
  string script_id = 1;
  optional string script_revision = 2;
}

message StudioMemberGAgentEndpointBindingRequest {
  string endpoint_id = 1;
  string display_name = 2;
  string kind = 3;
  string request_type_url = 4;
  string response_type_url = 5;
  string description = 6;
}

message StudioMemberGAgentBindingRequest {
  string actor_type_name = 1;
  repeated StudioMemberGAgentEndpointBindingRequest endpoints = 2;
}

message StudioMemberBindingRequest {
  string binding_run_id = 1;
  string scope_id = 2;
  string member_id = 3;
  string request_hash = 4;
  optional string revision_id = 5;
  oneof implementation {
    StudioMemberWorkflowBindingRequest workflow = 10;
    StudioMemberScriptBindingRequest script = 11;
    StudioMemberGAgentBindingRequest gagent = 12;
  }
}

message StudioMemberBindingAdmittedSnapshot {
  string member_id = 1;
  string scope_id = 2;
  string published_service_id = 3;
  StudioMemberImplementationKind implementation_kind = 4;
  string display_name = 5;
}

message StudioMemberPlatformBindingResult {
  string published_service_id = 1;
  string revision_id = 2;
  StudioMemberImplementationKind implementation_kind = 3;
  string expected_actor_id = 4;
  StudioMemberImplementationRef implementation_ref = 5;
}

message StudioMemberBindingRunState {
  string binding_run_id = 1;
  string scope_id = 2;
  string member_id = 3;
  string request_hash = 4;
  StudioMemberBindingRunStatus status = 5;
  StudioMemberBindingRequest request = 6;
  StudioMemberBindingAdmittedSnapshot admitted = 7;
  StudioMemberPlatformBindingResult platform_result = 8;
  StudioMemberBindingFailure failure = 9;
  google.protobuf.Timestamp accepted_at_utc = 10;
  google.protobuf.Timestamp updated_at_utc = 11;
  int32 attempt_count = 12;
  string platform_binding_command_id = 13;
}

// ─── State ───
//
// State for a single StudioMember actor. Actor ID format:
//   studio-member:{scopeId}:{memberId}
//
// publishedServiceId is generated once at creation from the immutable
// memberId and never recomputed afterwards. Renaming the display name does
// not change publishedServiceId.

message StudioMemberState {
  string member_id = 1;
  string scope_id = 2;
  string display_name = 3;
  string description = 4;
  StudioMemberImplementationKind implementation_kind = 5;
  StudioMemberImplementationRef implementation_ref = 6;
  string published_service_id = 7;
  StudioMemberLifecycleStage lifecycle_stage = 8;
  google.protobuf.Timestamp created_at_utc = 9;
  google.protobuf.Timestamp updated_at_utc = 10;
  StudioMemberBindingContract last_binding = 11;
  // Async binding protocol state. `last_binding` remains the single source of
  // truth for the last successful binding contract; this sub-state owns active
  // run status, stale-run rejection, and failure details.
  StudioMemberBindingAuthorityState binding = 12;
  // Optional team membership (ADR-0017). Absent means "unassigned"; empty
  // string is rejected at the application layer. Mutated only via committed
  // StudioMemberReassignedEvent.
  optional string team_id = 50;
}

// ─── Events ───
//
// One event per discrete transition. The actor materializes state from these
// events; projectors materialize the read model from the same envelope.

message StudioMemberCreatedEvent {
  string member_id = 1;
  string scope_id = 2;
  string display_name = 3;
  string description = 4;
  StudioMemberImplementationKind implementation_kind = 5;
  string published_service_id = 6;
  google.protobuf.Timestamp created_at_utc = 7;
}

message StudioMemberRenamedEvent {
  string display_name = 1;
  string description = 2;
  google.protobuf.Timestamp updated_at_utc = 3;
}

message StudioMemberImplementationUpdatedEvent {
  StudioMemberImplementationKind implementation_kind = 1;
  StudioMemberImplementationRef implementation_ref = 2;
  google.protobuf.Timestamp updated_at_utc = 3;
}

message StudioMemberBindingPlatformPendingEvent {
  string binding_run_id = 1;
  string platform_binding_command_id = 2;
  google.protobuf.Timestamp pending_at_utc = 3;
}

message StudioMemberBindingCompletedEvent {
  string binding_run_id = 1;
  string published_service_id = 2;
  string revision_id = 3;
  StudioMemberImplementationKind implementation_kind = 4;
  StudioMemberImplementationRef implementation_ref = 5;
  google.protobuf.Timestamp completed_at_utc = 6;
}

message StudioMemberBindingFailedEvent {
  string binding_run_id = 1;
  StudioMemberBindingFailure failure = 2;
}

message StudioMemberBindingRunRequested {
  StudioMemberBindingRequest request = 1;
  google.protobuf.Timestamp requested_at_utc = 2;
}

message StudioMemberBindAdmissionRequested {
  string binding_run_id = 1;
  string scope_id = 2;
  string member_id = 3;
  string request_hash = 4;
  StudioMemberBindingRequest request = 5;
  google.protobuf.Timestamp requested_at_utc = 6;
}

message StudioMemberBindingAdmittedEvent {
  string binding_run_id = 1;
  string member_id = 2;
  string scope_id = 3;
  string published_service_id = 4;
  StudioMemberImplementationKind implementation_kind = 5;
  string display_name = 6;
  google.protobuf.Timestamp admitted_at_utc = 7;
}

message StudioMemberBindingRejectedEvent {
  string binding_run_id = 1;
  string scope_id = 2;
  string member_id = 3;
  StudioMemberBindingFailure failure = 4;
}

message StudioMemberPlatformBindingStartRequested {
  string binding_run_id = 1;
  string platform_binding_command_id = 2;
  StudioMemberBindingRequest request = 3;
  StudioMemberBindingAdmittedSnapshot admitted = 4;
  google.protobuf.Timestamp requested_at_utc = 5;
}

message StudioMemberPlatformBindingAccepted {
  string binding_run_id = 1;
  string platform_binding_command_id = 2;
  google.protobuf.Timestamp accepted_at_utc = 3;
}

message StudioMemberPlatformBindingExecuteRequested {
  string binding_run_id = 1;
  string platform_binding_command_id = 2;
}

message StudioMemberPlatformBindingSucceeded {
  string binding_run_id = 1;
  string platform_binding_command_id = 2;
  StudioMemberPlatformBindingResult result = 3;
  google.protobuf.Timestamp completed_at_utc = 4;
}

message StudioMemberPlatformBindingFailed {
  string binding_run_id = 1;
  string platform_binding_command_id = 2;
  StudioMemberBindingFailure failure = 3;
}

message StudioMemberBindingRetryFired {
  string binding_run_id = 1;
  int32 attempt = 2;
  google.protobuf.Timestamp fired_at_utc = 3;
}

// Single reassignment event covers assign / unassign / move (ADR-0017).
// Both source and destination StudioTeamGAgents apply idempotent set
// operations against this event.
//
// from_team_id and to_team_id are `optional` so absence carries the
// "unassigned" intent; empty-string sentinels are not used.
//   pure assign:   from_team_id absent,    to_team_id = "T2"
//   pure unassign: from_team_id = "T1",    to_team_id absent
//   move:          from_team_id = "T1",    to_team_id = "T2"
// Constraints (enforced at the application layer):
//   - At least one of from_team_id / to_team_id must be present.
//   - from_team_id == to_team_id (both present and equal) is rejected.
//   - The teams identified by from_team_id / to_team_id (when present) must be
//     in the same scope as the member (i.e. TeamGAgent.State.ScopeId must equal
//     the member's scope_id).
message StudioMemberReassignedEvent {
  string member_id              = 1;
  string scope_id               = 2;
  optional string from_team_id  = 3;
  optional string to_team_id    = 4;
  google.protobuf.Timestamp reassigned_at_utc = 5;
}
