syntax = "proto3";
package aevatar.gagents.script_storage;
option csharp_namespace = "Aevatar.GAgents.ScriptStorage";

// ─── State ───

message ScriptStorageState {
  // scriptId → sourceText
  map<string, string> scripts = 1;
}

// ─── Events ───

message ScriptUploadedEvent {
  string script_id = 1;
  string source_text = 2;
}

// ─── Readmodel ───

// Published by the GAgent after each state change so subscribers can
// maintain an up-to-date readmodel without reading write-model state.
message ScriptStorageStateSnapshotEvent {
  ScriptStorageState snapshot = 1;
}
