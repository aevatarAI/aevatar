syntax = "proto3";
package aevatar.gagents.channelruntime;
option csharp_namespace = "Aevatar.GAgents.ChannelRuntime";

import "google/protobuf/timestamp.proto";

// ─── Persistent State ───

message ChannelBotRegistrationEntry {
  string id = 1;
  string platform = 2;
  string nyx_provider_slug = 3;
  string scope_id = 4;
  google.protobuf.Timestamp created_at = 5;
  string webhook_url = 6;  // Full callback URL configured via setWebhook
  // Soft-delete marker retained for projector watermark coordination
  // (Channel RFC §7.1.1): the registration stays in state after unregister so
  // the projector can emit a Tombstone verdict → IProjectionWriteDispatcher
  // .DeleteAsync. Housekeeping cleans watermark-passed entries.
  bool tombstoned = 7;
  int64 tombstone_state_version = 8;
  string nyx_channel_bot_id = 9;
  string nyx_agent_api_key_id = 10;
  string nyx_conversation_route_id = 11;
  reserved 12;
  reserved "credential_ref";
}

message ChannelBotRegistrationStoreState {
  repeated ChannelBotRegistrationEntry registrations = 1;
}

// ─── Device Registration (Actor-backed, #164 pattern) ───

message DeviceRegistrationEntry {
  string id = 1;
  string scope_id = 2;                    // Maps to household-{scope_id} actor
  string hmac_key = 3;                    // HMAC-SHA256 signing key for NyxID relay verification
  string nyx_conversation_id = 4;         // NyxID conversation ID
  string description = 5;                 // Human-readable label
  google.protobuf.Timestamp created_at = 6;
  // Soft-delete marker retained for projector watermark coordination
  // (Channel RFC §7.1.1): the registration stays in state after unregister so
  // the projector can emit a Tombstone verdict → IProjectionWriteDispatcher
  // .DeleteAsync. Housekeeping cleans watermark-passed entries.
  bool tombstoned = 7;
  int64 tombstone_state_version = 8;
}

message DeviceRegistrationState {
  repeated DeviceRegistrationEntry registrations = 1;
}

// Domain events for DeviceRegistrationGAgent
message DeviceRegisteredEvent {
  DeviceRegistrationEntry entry = 1;
}

message DeviceUnregisteredEvent {
  string registration_id = 1;
  int64 tombstone_state_version = 2;
}

// Commands dispatched to DeviceRegistrationGAgent via EventEnvelope
message DeviceRegisterCommand {
  string scope_id = 1;
  string hmac_key = 2;
  string nyx_conversation_id = 3;
  string description = 4;
}

message DeviceUnregisterCommand {
  string registration_id = 1;
}

message DeviceCompactTombstonesCommand {
  int64 safe_state_version = 1;
}

message DeviceTombstonesCompactedEvent {
  repeated string registration_ids = 1;
  int64 safe_state_version = 2;
}

// Projection read model for device registrations
message DeviceRegistrationDocument {
  string id = 1;                          // Registration ID (= document key)
  string scope_id = 2;
  string hmac_key = 3;
  string nyx_conversation_id = 4;
  string description = 5;
  int64 state_version = 6;
  string last_event_id = 7;
  google.protobuf.Timestamp updated_at_utc = 8;
  string actor_id = 9;                    // Source actor ID
}

// ─── Channel Bot Registration (Actor-backed, same pattern as DeviceRegistration) ───

// Domain events for ChannelBotRegistrationGAgent
message ChannelBotRegisteredEvent {
  ChannelBotRegistrationEntry entry = 1;
}

message ChannelBotUnregisteredEvent {
  string registration_id = 1;
  int64 tombstone_state_version = 2;
}

// Commands dispatched to ChannelBotRegistrationGAgent via EventEnvelope
message ChannelBotRegisterCommand {
  string platform = 1;
  string nyx_provider_slug = 2;
  string scope_id = 3;
  string webhook_url = 4;
  string requested_id = 5;  // Caller-provided ID; actor uses if non-empty, else generates
  string nyx_channel_bot_id = 6;
  string nyx_agent_api_key_id = 7;
  string nyx_conversation_route_id = 8;
  reserved 9;
  reserved "credential_ref";
}

message ChannelBotUnregisterCommand {
  string registration_id = 1;
}

message ChannelBotRebuildProjectionCommand {
  string reason = 1;
}

message ChannelBotCompactTombstonesCommand {
  int64 safe_state_version = 1;
}

// Repairs the canonical scope_id of an existing registration without rewriting
// the rest of the entry. Emitted by the rebuild backfill path so empty-scope
// entries can be patched in place — preserves created_at and webhook target.
message ChannelBotRepairScopeIdCommand {
  string registration_id = 1;
  string scope_id = 2;
}

message ChannelBotProjectionRebuildRequestedEvent {
  string reason = 1;
  google.protobuf.Timestamp requested_at = 2;
}

message ChannelBotTombstonesCompactedEvent {
  repeated string registration_ids = 1;
  int64 safe_state_version = 2;
}

// Persisted when the registration store rejects an inbound register command
// (e.g. missing scope_id). Carries no state transition; lives in the actor
// event log as a durable diagnostic so upstream contract breaks remain
// auditable without polluting the registration set.
message ChannelBotRegistrationRejectedEvent {
  string reason = 1;
  string platform = 2;
  string requested_id = 3;
  string nyx_agent_api_key_id = 4;
  google.protobuf.Timestamp rejected_at = 5;
}

// Emitted when a previously empty-scope entry is repaired in place. Captures
// the prior scope_id so the audit trail records the rewrite without losing
// historical context, and the projector picks the new scope_id off state.
message ChannelBotScopeIdRepairedEvent {
  string registration_id = 1;
  string previous_scope_id = 2;
  string scope_id = 3;
  google.protobuf.Timestamp repaired_at = 4;
}

// Projection read model for channel bot registrations
message ChannelBotRegistrationDocument {
  string id = 1;                            // Registration ID (= document key)
  string platform = 2;
  string nyx_provider_slug = 3;
  string scope_id = 4;
  string webhook_url = 5;
  int64 state_version = 6;
  string last_event_id = 7;
  google.protobuf.Timestamp updated_at_utc = 8;
  string actor_id = 9;                      // Source actor ID
  string nyx_channel_bot_id = 10;
  string nyx_agent_api_key_id = 11;
  string nyx_conversation_route_id = 12;
  reserved 13;
  reserved "credential_ref";
}

// ─── Owner scope (caller identity tuple) ───
//
// Carries the (NyxID user, surface platform, registration scope, channel
// sender) tuple that uniquely identifies an agent's owner across cli/web/
// lark/telegram. Replaces the scattered `owner_nyx_user_id` / `platform` /
// `scope_id` fields scattered across catalog/state/event messages, so a
// caller-scoped read is a single typed full-tuple equality.
//
// `platform` is a closed canonical string set: "nyxid" (native cli/web),
// "lark", "telegram". Empty is invalid at the resolver output and at command
// ingress.
//
// `registration_scope_id` and `sender_id` are required iff `platform != "nyxid"`
// (non-native surfaces). For native NyxID surfaces both are empty strings.
message OwnerScope {
  string nyx_user_id = 1;
  string platform = 2;
  string registration_scope_id = 3;
  string sender_id = 4;
}

// ─── User Agent Catalog (actor-backed delivery target store) ───

message UserAgentCatalogEntry {
  string agent_id = 1;
  // Deprecated: read-only legacy fallback; new writes leave empty and rely on
  // owner_scope.platform. Kept on the wire so legacy state without owner_scope
  // still loads (nyxid surface backfills lazily; lark surface deprecate-and-
  // recreates per issue #466 migration plan).
  string platform = 2 [deprecated = true];
  string conversation_id = 3;
  string nyx_provider_slug = 4;
  // Deprecated: secret-bearing field; the public DTO `UserAgentCatalogEntry`
  // surfaced via `IUserAgentCatalogQueryPort` no longer carries this. The
  // credential is read through the narrow internal `IUserAgentDeliveryTargetReader`
  // contract by outbound delivery code only.
  string nyx_api_key = 5 [deprecated = true];
  // Deprecated: superseded by owner_scope.nyx_user_id. See platform field.
  string owner_nyx_user_id = 6 [deprecated = true];
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  bool tombstoned = 9;
  string agent_type = 10;
  string template_name = 11;
  // Deprecated: workflow/skill execution scope (not registration scope). Kept
  // for the existing semantic. owner_scope.registration_scope_id is a separate
  // field for the bot/registration scope.
  string scope_id = 12;
  string api_key_id = 13;
  string schedule_cron = 14;
  string schedule_timezone = 15;
  string status = 16;
  google.protobuf.Timestamp last_run_at = 17;
  google.protobuf.Timestamp next_run_at = 18;
  int32 error_count = 19;
  string last_error = 20;
  int64 tombstone_state_version = 21;
  // Authoritative Lark outbound delivery target captured at create time. When
  // both fields are present, outbound senders use them verbatim instead of
  // inferring receive_id_type from the conversation_id prefix. The creator
  // pins the chat-scoped `chat_id` (`oc_*`) here when available because it is
  // the only identifier that survives both cross-app and cross-tenant
  // boundaries when the same Lark app is on both ends of the relay.
  string lark_receive_id = 22;
  string lark_receive_id_type = 23;
  // Secondary outbound delivery target. The runtime attempts the primary
  // (`lark_receive_id`/`lark_receive_id_type`) first and falls back to this
  // pair on a Lark `230002 bot not in chat` rejection — the failure mode
  // when the outbound app is a different Lark app than the one that received
  // the inbound DM (cross-app same-tenant deployment). The creator pins
  // `union_id` (`on_*`) here so the fallback survives a chat_id rejection
  // without needing a fresh ingress event.
  string lark_receive_id_fallback = 24;
  string lark_receive_id_type_fallback = 25;
  // Caller scope captured at create time. New writes always populate this;
  // the deprecated platform/owner_nyx_user_id fields are kept readable for
  // legacy state (issue #466 migration plan).
  OwnerScope owner_scope = 26;
}

message UserAgentCatalogState {
  repeated UserAgentCatalogEntry entries = 1;
}

message UserAgentCatalogUpsertCommand {
  string agent_id = 1;
  // Deprecated: superseded by owner_scope.platform. Issue #466.
  string platform = 2 [deprecated = true];
  string conversation_id = 3;
  string nyx_provider_slug = 4;
  string nyx_api_key = 5;
  // Deprecated: superseded by owner_scope.nyx_user_id. Issue #466.
  string owner_nyx_user_id = 6 [deprecated = true];
  string agent_type = 7;
  string template_name = 8;
  string scope_id = 9;
  string api_key_id = 10;
  string schedule_cron = 11;
  string schedule_timezone = 12;
  string status = 13;
  // See UserAgentCatalogEntry.lark_receive_id for semantics. Empty values
  // preserve any existing entry value via the merge-non-empty upsert policy.
  string lark_receive_id = 14;
  string lark_receive_id_type = 15;
  // See UserAgentCatalogEntry.lark_receive_id_fallback for semantics.
  string lark_receive_id_fallback = 16;
  string lark_receive_id_type_fallback = 17;
  // Caller scope captured at create time. Required for new writes.
  OwnerScope owner_scope = 18;
}

message UserAgentCatalogTombstoneCommand {
  string agent_id = 1;
}

message UserAgentCatalogExecutionUpdateCommand {
  string agent_id = 1;
  string status = 2;
  google.protobuf.Timestamp last_run_at = 3;
  google.protobuf.Timestamp next_run_at = 4;
  int32 error_count = 5;
  string last_error = 6;
}

message UserAgentCatalogCompactTombstonesCommand {
  int64 safe_state_version = 1;
}

message UserAgentCatalogUpsertedEvent {
  UserAgentCatalogEntry entry = 1;
}

message UserAgentCatalogTombstonedEvent {
  string agent_id = 1;
  int64 tombstone_state_version = 2;
}

message UserAgentCatalogExecutionUpdatedEvent {
  string agent_id = 1;
  string status = 2;
  google.protobuf.Timestamp last_run_at = 3;
  google.protobuf.Timestamp next_run_at = 4;
  int32 error_count = 5;
  string last_error = 6;
}

message UserAgentCatalogTombstonesCompactedEvent {
  repeated string agent_ids = 1;
  int64 safe_state_version = 2;
}

message UserAgentCatalogDocument {
  string id = 1;
  // Deprecated: superseded by owner_scope.platform. Kept for legacy reads.
  string platform = 2 [deprecated = true];
  string conversation_id = 3;
  string nyx_provider_slug = 4;
  reserved 5;
  reserved "nyx_api_key";
  // Deprecated: superseded by owner_scope.nyx_user_id. Kept for legacy reads.
  string owner_nyx_user_id = 6 [deprecated = true];
  bool tombstoned = 7;
  int64 state_version = 8;
  string last_event_id = 9;
  google.protobuf.Timestamp updated_at_utc = 10;
  string actor_id = 11;
  google.protobuf.Timestamp created_at_utc = 12;
  string agent_type = 13;
  string template_name = 14;
  string scope_id = 15;
  string api_key_id = 16;
  string schedule_cron = 17;
  string schedule_timezone = 18;
  string status = 19;
  google.protobuf.Timestamp last_run_at_utc = 20;
  google.protobuf.Timestamp next_run_at_utc = 21;
  int32 error_count = 22;
  string last_error = 23;
  // Mirrors UserAgentCatalogEntry.lark_receive_id*. Required so catalog-backed
  // outbound senders (FeishuCardHumanInteractionPort) read the typed target
  // through the projection rather than re-deriving from conversation_id.
  string lark_receive_id = 24;
  string lark_receive_id_type = 25;
  // Mirrors UserAgentCatalogEntry.lark_receive_id_fallback*. Carried through
  // the projection so catalog-backed senders see the same primary+fallback
  // pair as actor-state senders.
  string lark_receive_id_fallback = 26;
  string lark_receive_id_type_fallback = 27;
  // Caller scope materialized from the upserted entry. New rows always carry
  // this; legacy rows may have only owner_nyx_user_id+platform set, in which
  // case the caller-scoped query port lazily synthesizes owner_scope on read
  // for the nyxid surface (issue #466 migration plan).
  OwnerScope owner_scope = 28;
}

// Runtime-only Nyx credential read model for delivery-target execution paths.
message UserAgentCatalogNyxCredentialDocument {
  string id = 1;
  string nyx_api_key = 2;
  int64 state_version = 3;
  string last_event_id = 4;
  google.protobuf.Timestamp updated_at_utc = 5;
  string actor_id = 6;
}

// ─── Skill Runner (persistent scheduled agent) ───

message SkillRunnerOutboundConfig {
  string conversation_id = 1;
  string nyx_provider_slug = 2;
  string nyx_api_key = 3;
  // Deprecated: superseded by owner_scope.nyx_user_id. Issue #466.
  string owner_nyx_user_id = 4 [deprecated = true];
  string api_key_id = 5;
  // Deprecated: superseded by owner_scope.platform. Issue #466.
  string platform = 6 [deprecated = true];
  // Authoritative Lark outbound delivery target captured at create time. When
  // both fields are present, SkillRunnerGAgent.SendOutputAsync uses them
  // verbatim; conversation_id stays for LLM metadata propagation only.
  string lark_receive_id = 7;
  string lark_receive_id_type = 8;
  // Secondary outbound delivery target. Used by SkillRunnerGAgent.SendOutputAsync
  // when the primary chat_id-typed send is rejected with Lark `230002 bot not in
  // chat` — the failure mode for cross-app same-tenant deployments where the
  // outbound app is not a member of the inbound DM. See
  // UserAgentCatalogEntry.lark_receive_id_fallback for the recommended pinning.
  string lark_receive_id_fallback = 9;
  string lark_receive_id_type_fallback = 10;
  // Caller scope captured at create time. Replaces owner_nyx_user_id+platform
  // for new agents; the deprecated scattered fields remain for legacy state.
  OwnerScope owner_scope = 11;
}

message SkillRunnerState {
  string skill_name = 1;
  string template_name = 2;
  string skill_content = 3;
  string execution_prompt = 4;
  string schedule_cron = 5;
  string schedule_timezone = 6;
  SkillRunnerOutboundConfig outbound_config = 7;
  google.protobuf.Timestamp last_run_at = 8;
  google.protobuf.Timestamp next_run_at = 9;
  int32 error_count = 10;
  string last_output = 11;
  string last_error = 12;
  bool enabled = 13;
  string scope_id = 14;
  string provider_name = 15;
  string model = 16;
  optional double temperature = 17;
  optional int32 max_tokens = 18;
  optional int32 max_tool_rounds = 19;
  optional int32 max_history_messages = 20;
}

message InitializeSkillRunnerCommand {
  string skill_name = 1;
  string template_name = 2;
  string skill_content = 3;
  string execution_prompt = 4;
  string schedule_cron = 5;
  string schedule_timezone = 6;
  SkillRunnerOutboundConfig outbound_config = 7;
  bool enabled = 8;
  string scope_id = 9;
  string provider_name = 10;
  string model = 11;
  optional double temperature = 12;
  optional int32 max_tokens = 13;
  optional int32 max_tool_rounds = 14;
  optional int32 max_history_messages = 15;
}

message SkillRunnerInitializedEvent {
  string skill_name = 1;
  string template_name = 2;
  string skill_content = 3;
  string execution_prompt = 4;
  string schedule_cron = 5;
  string schedule_timezone = 6;
  SkillRunnerOutboundConfig outbound_config = 7;
  bool enabled = 8;
  string scope_id = 9;
  string provider_name = 10;
  string model = 11;
  optional double temperature = 12;
  optional int32 max_tokens = 13;
  optional int32 max_tool_rounds = 14;
  optional int32 max_history_messages = 15;
}

message TriggerSkillRunnerExecutionCommand {
  string reason = 1;
  // 0 = first attempt, 1 = backoff retry after a failed first attempt.
  // Bounded by SkillRunnerDefaults.MaxRetryAttempts; retries are event-ified
  // via ScheduleSelfDurableTimeoutAsync and never block the actor turn.
  int32 retry_attempt = 2;
}

message SkillRunnerNextRunScheduledEvent {
  google.protobuf.Timestamp next_run_at = 1;
}

message SkillRunnerExecutionCompletedEvent {
  google.protobuf.Timestamp completed_at = 1;
  string output = 2;
}

message SkillRunnerExecutionFailedEvent {
  google.protobuf.Timestamp failed_at = 1;
  string error = 2;
}

message DisableSkillRunnerCommand {
  string reason = 1;
}

message EnableSkillRunnerCommand {
  string reason = 1;
}

message SkillRunnerDisabledEvent {
  string reason = 1;
}

message SkillRunnerEnabledEvent {
  string reason = 1;
}

// ─── Workflow Agent (persistent scheduled workflow trigger) ───

message WorkflowAgentState {
  string workflow_id = 1;
  string workflow_name = 2;
  string workflow_actor_id = 3;
  string execution_prompt = 4;
  string schedule_cron = 5;
  string schedule_timezone = 6;
  string conversation_id = 7;
  string nyx_provider_slug = 8;
  string nyx_api_key = 9;
  // Deprecated: superseded by owner_scope.nyx_user_id. Issue #466.
  string owner_nyx_user_id = 10 [deprecated = true];
  string api_key_id = 11;
  google.protobuf.Timestamp last_run_at = 12;
  google.protobuf.Timestamp next_run_at = 13;
  int32 error_count = 14;
  string last_error = 15;
  bool enabled = 16;
  string scope_id = 17;
  // Deprecated: superseded by owner_scope.platform. Issue #466.
  string platform = 18 [deprecated = true];
  // See UserAgentCatalogEntry.lark_receive_id for semantics; copied verbatim
  // into the catalog entry on UpsertRegistryAsync so downstream Lark senders
  // (e.g. FeishuCardHumanInteractionPort) read the typed target.
  string lark_receive_id = 19;
  string lark_receive_id_type = 20;
  // Secondary outbound delivery target. See UserAgentCatalogEntry
  // .lark_receive_id_fallback for runtime fallback semantics.
  string lark_receive_id_fallback = 21;
  string lark_receive_id_type_fallback = 22;
  // Caller scope captured at create time. Replaces owner_nyx_user_id+platform
  // for new agents; the deprecated scattered fields remain for legacy state.
  OwnerScope owner_scope = 23;
}

message InitializeWorkflowAgentCommand {
