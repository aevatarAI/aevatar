  string workflow_actor_id = 3;
  string execution_prompt = 4;
  string schedule_cron = 5;
  string schedule_timezone = 6;
  string conversation_id = 7;
  string nyx_provider_slug = 8;
  string nyx_api_key = 9;
  // Deprecated: superseded by owner_scope.nyx_user_id. Issue #466.
  string owner_nyx_user_id = 10 [deprecated = true];
  string api_key_id = 11;
  bool enabled = 12;
  string scope_id = 13;
  // Deprecated: superseded by owner_scope.platform. Issue #466.
  string platform = 14 [deprecated = true];
  string lark_receive_id = 15;
  string lark_receive_id_type = 16;
  // Secondary outbound delivery target. See UserAgentCatalogEntry
  // .lark_receive_id_fallback for runtime fallback semantics.
  string lark_receive_id_fallback = 17;
  string lark_receive_id_type_fallback = 18;
  // Caller scope captured at create time. Required for new commands.
  OwnerScope owner_scope = 19;
}

message WorkflowAgentInitializedEvent {
  string workflow_id = 1;
  string workflow_name = 2;
  string workflow_actor_id = 3;
