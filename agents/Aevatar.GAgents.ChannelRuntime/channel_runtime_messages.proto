syntax = "proto3";
package aevatar.gagents.channelruntime;
option csharp_namespace = "Aevatar.GAgents.ChannelRuntime";

import "google/protobuf/timestamp.proto";

// ─── Persistent State ───

message ChannelBotRegistrationEntry {
  string id = 1;
  string platform = 2;
  string nyx_provider_slug = 3;
  string scope_id = 4;
  google.protobuf.Timestamp created_at = 5;
  string webhook_url = 6;  // Full callback URL configured via setWebhook
  // Soft-delete marker retained for projector watermark coordination
  // (Channel RFC §7.1.1): the registration stays in state after unregister so
  // the projector can emit a Tombstone verdict → IProjectionWriteDispatcher
  // .DeleteAsync. Housekeeping cleans watermark-passed entries.
  bool tombstoned = 7;
  int64 tombstone_state_version = 8;
  string nyx_channel_bot_id = 9;
  string nyx_agent_api_key_id = 10;
  string nyx_conversation_route_id = 11;
  ChannelBotLegacyDirectBinding legacy_direct_binding = 12;
}

message ChannelBotRegistrationStoreState {
  repeated ChannelBotRegistrationEntry registrations = 1;
}

// ─── Channel User Identity (per platform sender, coordinator actor) ───

message ChannelUserState {
  string platform = 1;
  string platform_user_id = 2;
  string display_name = 3;
  string nyxid_user_id = 4;           // empty = 未绑定
  string nyxid_access_token = 5;      // empty = 用 registration fallback token
  google.protobuf.Timestamp first_seen = 6;
  google.protobuf.Timestamp last_seen = 7;
  map<string, ChannelPendingChatSession> pending_sessions = 8;  // session_id → pending session
  repeated string processed_message_ids = 9;                    // durable dedup — bounded to last 200
}

// Tracks an in-flight chat request (persisted in actor state for durability).
message ChannelPendingChatSession {
  string session_id = 1;
  string chat_actor_id = 2;
  string org_token = 3;
  // Replay context from original inbound event
  string platform = 4;
  string conversation_id = 5;
  string sender_id = 6;
  string sender_name = 7;
  string message_id = 8;
  string chat_type = 9;
  string registration_id = 10;
  string nyx_provider_slug = 11;
  string registration_scope_id = 12;
  string prompt = 13;
  google.protobuf.Timestamp timeout_at = 14;
}

// Domain event: track sender identity on each inbound message
message ChannelUserTrackedEvent {
  string platform = 1;
  string platform_user_id = 2;
  string display_name = 3;
}

// Domain event: user binds NyxID identity
message ChannelUserBoundEvent {
  string nyxid_user_id = 1;
  string nyxid_access_token = 2;
}

// ─── Device Registration (Actor-backed, #164 pattern) ───

message DeviceRegistrationEntry {
  string id = 1;
  string scope_id = 2;                    // Maps to household-{scope_id} actor
  string hmac_key = 3;                    // HMAC-SHA256 signing key for NyxID relay verification
  string nyx_conversation_id = 4;         // NyxID conversation ID
  string description = 5;                 // Human-readable label
  google.protobuf.Timestamp created_at = 6;
  // Soft-delete marker retained for projector watermark coordination
  // (Channel RFC §7.1.1): the registration stays in state after unregister so
  // the projector can emit a Tombstone verdict → IProjectionWriteDispatcher
  // .DeleteAsync. Housekeeping cleans watermark-passed entries.
  bool tombstoned = 7;
  int64 tombstone_state_version = 8;
}

message DeviceRegistrationState {
  repeated DeviceRegistrationEntry registrations = 1;
}

// Domain events for DeviceRegistrationGAgent
message DeviceRegisteredEvent {
  DeviceRegistrationEntry entry = 1;
}

message DeviceUnregisteredEvent {
  string registration_id = 1;
  int64 tombstone_state_version = 2;
}

// Commands dispatched to DeviceRegistrationGAgent via EventEnvelope
message DeviceRegisterCommand {
  string scope_id = 1;
  string hmac_key = 2;
  string nyx_conversation_id = 3;
  string description = 4;
}

message DeviceUnregisterCommand {
  string registration_id = 1;
}

message DeviceCompactTombstonesCommand {
  int64 safe_state_version = 1;
}

message DeviceTombstonesCompactedEvent {
  repeated string registration_ids = 1;
  int64 safe_state_version = 2;
}

// Projection read model for device registrations
message DeviceRegistrationDocument {
  string id = 1;                          // Registration ID (= document key)
  string scope_id = 2;
  string hmac_key = 3;
  string nyx_conversation_id = 4;
  string description = 5;
  int64 state_version = 6;
  string last_event_id = 7;
  google.protobuf.Timestamp updated_at_utc = 8;
  string actor_id = 9;                    // Source actor ID
}

// ─── Channel Bot Registration (Actor-backed, same pattern as DeviceRegistration) ───

// Domain events for ChannelBotRegistrationGAgent
message ChannelBotRegisteredEvent {
  ChannelBotRegistrationEntry entry = 1;
}

message ChannelBotUnregisteredEvent {
  string registration_id = 1;
  int64 tombstone_state_version = 2;
}

// Commands dispatched to ChannelBotRegistrationGAgent via EventEnvelope
message ChannelBotLegacyDirectBinding {
  string nyx_user_token = 1;
  string nyx_refresh_token = 2;
  string verification_token = 3;
  // Late-bound credential reference for direct platform/webhook secrets.
  string credential_ref = 4;
  string encrypt_key = 5;   // Deprecated legacy raw field retained only for migration fallback.
}

message ChannelBotRegisterCommand {
  string platform = 1;
  string nyx_provider_slug = 2;
  string scope_id = 3;
  string webhook_url = 4;
  string requested_id = 5;  // Caller-provided ID; actor uses if non-empty, else generates
  string nyx_channel_bot_id = 6;
  string nyx_agent_api_key_id = 7;
  string nyx_conversation_route_id = 8;
  ChannelBotLegacyDirectBinding legacy_direct_binding = 9;
}

message ChannelBotUnregisterCommand {
  string registration_id = 1;
}

message ChannelBotUpdateTokenCommand {
  string registration_id = 1;
  ChannelBotLegacyDirectBinding legacy_direct_binding = 2;
}

message ChannelBotCompactTombstonesCommand {
  int64 safe_state_version = 1;
}

message ChannelBotTombstonesCompactedEvent {
  repeated string registration_ids = 1;
  int64 safe_state_version = 2;
}

// Domain event: token updated on an existing registration
message ChannelBotTokenUpdatedEvent {
  string registration_id = 1;
  ChannelBotLegacyDirectBinding legacy_direct_binding = 2;
}

// Projection read model for channel bot registrations
message ChannelBotRegistrationDocument {
  string id = 1;                            // Registration ID (= document key)
  string platform = 2;
  string nyx_provider_slug = 3;
  string scope_id = 4;
  string verification_token = 5;
  string webhook_url = 6;
  int64 state_version = 7;
  string last_event_id = 8;
  google.protobuf.Timestamp updated_at_utc = 9;
  string actor_id = 10;                     // Source actor ID
  string nyx_channel_bot_id = 11;
  string nyx_agent_api_key_id = 12;
  string nyx_conversation_route_id = 13;
}

// Runtime-only legacy direct binding read model. This is intentionally separate
// from ChannelBotRegistrationDocument so the normal registration query surface
// carries only non-secret identifiers.
message ChannelBotLegacyDirectBindingDocument {
  string id = 1;                            // Registration ID (= document key)
  string nyx_user_token = 2;
  string nyx_refresh_token = 3;
  string verification_token = 4;
  string credential_ref = 5;
  string encrypt_key = 6;
  int64 state_version = 7;
  string last_event_id = 8;
  google.protobuf.Timestamp updated_at_utc = 9;
  string actor_id = 10;                     // Source actor ID
}

// ─── User Agent Catalog (actor-backed delivery target store) ───

message UserAgentCatalogEntry {
  string agent_id = 1;
  string platform = 2;
  string conversation_id = 3;
  string nyx_provider_slug = 4;
  string nyx_api_key = 5;
  string owner_nyx_user_id = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  bool tombstoned = 9;
  string agent_type = 10;
  string template_name = 11;
  string scope_id = 12;
  string api_key_id = 13;
  string schedule_cron = 14;
  string schedule_timezone = 15;
  string status = 16;
  google.protobuf.Timestamp last_run_at = 17;
  google.protobuf.Timestamp next_run_at = 18;
  int32 error_count = 19;
  string last_error = 20;
  int64 tombstone_state_version = 21;
}

message UserAgentCatalogState {
  repeated UserAgentCatalogEntry entries = 1;
}

message UserAgentCatalogUpsertCommand {
  string agent_id = 1;
  string platform = 2;
  string conversation_id = 3;
  string nyx_provider_slug = 4;
  string nyx_api_key = 5;
  string owner_nyx_user_id = 6;
  string agent_type = 7;
  string template_name = 8;
  string scope_id = 9;
  string api_key_id = 10;
  string schedule_cron = 11;
  string schedule_timezone = 12;
  string status = 13;
}

message UserAgentCatalogTombstoneCommand {
  string agent_id = 1;
}

message UserAgentCatalogExecutionUpdateCommand {
  string agent_id = 1;
  string status = 2;
  google.protobuf.Timestamp last_run_at = 3;
  google.protobuf.Timestamp next_run_at = 4;
  int32 error_count = 5;
  string last_error = 6;
}

message UserAgentCatalogCompactTombstonesCommand {
  int64 safe_state_version = 1;
}

message UserAgentCatalogUpsertedEvent {
  UserAgentCatalogEntry entry = 1;
}

message UserAgentCatalogTombstonedEvent {
  string agent_id = 1;
  int64 tombstone_state_version = 2;
}

message UserAgentCatalogExecutionUpdatedEvent {
  string agent_id = 1;
  string status = 2;
  google.protobuf.Timestamp last_run_at = 3;
  google.protobuf.Timestamp next_run_at = 4;
  int32 error_count = 5;
  string last_error = 6;
}

message UserAgentCatalogTombstonesCompactedEvent {
  repeated string agent_ids = 1;
  int64 safe_state_version = 2;
}

message UserAgentCatalogDocument {
  string id = 1;
  string platform = 2;
  string conversation_id = 3;
  string nyx_provider_slug = 4;
  reserved 5;
  reserved "nyx_api_key";
  string owner_nyx_user_id = 6;
  bool tombstoned = 7;
  int64 state_version = 8;
  string last_event_id = 9;
  google.protobuf.Timestamp updated_at_utc = 10;
  string actor_id = 11;
  google.protobuf.Timestamp created_at_utc = 12;
  string agent_type = 13;
  string template_name = 14;
  string scope_id = 15;
  string api_key_id = 16;
  string schedule_cron = 17;
  string schedule_timezone = 18;
  string status = 19;
  google.protobuf.Timestamp last_run_at_utc = 20;
  google.protobuf.Timestamp next_run_at_utc = 21;
  int32 error_count = 22;
  string last_error = 23;
}

// Runtime-only Nyx credential read model for delivery-target execution paths.
message UserAgentCatalogNyxCredentialDocument {
  string id = 1;
  string nyx_api_key = 2;
  int64 state_version = 3;
  string last_event_id = 4;
  google.protobuf.Timestamp updated_at_utc = 5;
  string actor_id = 6;
}

// ─── Skill Runner (persistent scheduled agent) ───

message SkillRunnerOutboundConfig {
  string conversation_id = 1;
  string nyx_provider_slug = 2;
  string nyx_api_key = 3;
  string owner_nyx_user_id = 4;
  string api_key_id = 5;
  // Channel platform identifier (e.g. "lark", "telegram"). Empty = unspecified;
  // UserAgentCatalog upsert defaults to "lark" for backward compatibility.
  string platform = 6;
}

message SkillRunnerState {
  string skill_name = 1;
  string template_name = 2;
  string skill_content = 3;
  string execution_prompt = 4;
  string schedule_cron = 5;
  string schedule_timezone = 6;
  SkillRunnerOutboundConfig outbound_config = 7;
  google.protobuf.Timestamp last_run_at = 8;
  google.protobuf.Timestamp next_run_at = 9;
  int32 error_count = 10;
  string last_output = 11;
  string last_error = 12;
  bool enabled = 13;
  string scope_id = 14;
  string provider_name = 15;
  string model = 16;
  optional double temperature = 17;
  optional int32 max_tokens = 18;
  optional int32 max_tool_rounds = 19;
  optional int32 max_history_messages = 20;
}

message InitializeSkillRunnerCommand {
  string skill_name = 1;
  string template_name = 2;
  string skill_content = 3;
  string execution_prompt = 4;
  string schedule_cron = 5;
  string schedule_timezone = 6;
  SkillRunnerOutboundConfig outbound_config = 7;
  bool enabled = 8;
  string scope_id = 9;
  string provider_name = 10;
  string model = 11;
  optional double temperature = 12;
  optional int32 max_tokens = 13;
  optional int32 max_tool_rounds = 14;
  optional int32 max_history_messages = 15;
}

message SkillRunnerInitializedEvent {
  string skill_name = 1;
  string template_name = 2;
  string skill_content = 3;
  string execution_prompt = 4;
  string schedule_cron = 5;
  string schedule_timezone = 6;
  SkillRunnerOutboundConfig outbound_config = 7;
  bool enabled = 8;
  string scope_id = 9;
  string provider_name = 10;
  string model = 11;
  optional double temperature = 12;
  optional int32 max_tokens = 13;
  optional int32 max_tool_rounds = 14;
  optional int32 max_history_messages = 15;
}

message TriggerSkillRunnerExecutionCommand {
  string reason = 1;
  // 0 = first attempt, 1 = backoff retry after a failed first attempt.
  // Bounded by SkillRunnerDefaults.MaxRetryAttempts; retries are event-ified
  // via ScheduleSelfDurableTimeoutAsync and never block the actor turn.
  int32 retry_attempt = 2;
}

message SkillRunnerNextRunScheduledEvent {
  google.protobuf.Timestamp next_run_at = 1;
}

message SkillRunnerExecutionCompletedEvent {
  google.protobuf.Timestamp completed_at = 1;
  string output = 2;
}

message SkillRunnerExecutionFailedEvent {
  google.protobuf.Timestamp failed_at = 1;
  string error = 2;
}

message DisableSkillRunnerCommand {
  string reason = 1;
}

message EnableSkillRunnerCommand {
  string reason = 1;
}

message SkillRunnerDisabledEvent {
  string reason = 1;
}

message SkillRunnerEnabledEvent {
  string reason = 1;
}

// ─── Workflow Agent (persistent scheduled workflow trigger) ───

message WorkflowAgentState {
  string workflow_id = 1;
  string workflow_name = 2;
  string workflow_actor_id = 3;
  string execution_prompt = 4;
  string schedule_cron = 5;
  string schedule_timezone = 6;
  string conversation_id = 7;
  string nyx_provider_slug = 8;
  string nyx_api_key = 9;
  string owner_nyx_user_id = 10;
  string api_key_id = 11;
  google.protobuf.Timestamp last_run_at = 12;
  google.protobuf.Timestamp next_run_at = 13;
  int32 error_count = 14;
  string last_error = 15;
  bool enabled = 16;
  string scope_id = 17;
  // Channel platform identifier (e.g. "lark", "telegram"). Empty = unspecified;
  // UserAgentCatalog upsert defaults to "lark" for backward compatibility.
  string platform = 18;
}

message InitializeWorkflowAgentCommand {
  string workflow_id = 1;
  string workflow_name = 2;
  string workflow_actor_id = 3;
  string execution_prompt = 4;
  string schedule_cron = 5;
  string schedule_timezone = 6;
  string conversation_id = 7;
  string nyx_provider_slug = 8;
  string nyx_api_key = 9;
  string owner_nyx_user_id = 10;
  string api_key_id = 11;
  bool enabled = 12;
  string scope_id = 13;
  // Channel platform identifier; empty → default "lark" at upsert time.
  string platform = 14;
}

message WorkflowAgentInitializedEvent {
  string workflow_id = 1;
  string workflow_name = 2;
  string workflow_actor_id = 3;
  string execution_prompt = 4;
  string schedule_cron = 5;
  string schedule_timezone = 6;
  string conversation_id = 7;
  string nyx_provider_slug = 8;
  string nyx_api_key = 9;
  string owner_nyx_user_id = 10;
  string api_key_id = 11;
  bool enabled = 12;
  string scope_id = 13;
  // Channel platform identifier; empty → default "lark" at upsert time.
  string platform = 14;
}

message TriggerWorkflowAgentExecutionCommand {
  string reason = 1;
  string revision_feedback = 2;
}

message WorkflowAgentNextRunScheduledEvent {
  google.protobuf.Timestamp next_run_at = 1;
}

message WorkflowAgentExecutionDispatchedEvent {
  google.protobuf.Timestamp dispatched_at = 1;
  string workflow_run_actor_id = 2;
  string command_id = 3;
}

message WorkflowAgentExecutionFailedEvent {
  google.protobuf.Timestamp failed_at = 1;
  string error = 2;
}

message DisableWorkflowAgentCommand {
  string reason = 1;
}

message EnableWorkflowAgentCommand {
  string reason = 1;
}

message WorkflowAgentDisabledEvent {
  string reason = 1;
}

message WorkflowAgentEnabledEvent {
  string reason = 1;
}

// ─── Channel Chat Lifecycle (continuation pattern) ───

// Domain event: chat session requested — carries full replay context
// so ApplyRequested can restore pending_sessions from event store.
//
// Wire safety: field 1 was never persisted under a prior schema — this
// message type is new in the continuation-pattern PR (feature/bot,
// 2026-04-11). ApplyRequested guards evt.Session == null as defense
// against any hypothetical wire mismatch.
message ChannelChatRequestedEvent {
  ChannelPendingChatSession session = 1;
}

// Domain event: inbound message dispatch succeeded.
// Persisted only after chat dispatch succeeds so durable dedup never marks
// a message as processed before the chat actor has accepted it.
message ChannelInboundDispatchedEvent {
  string session_id = 1;
  string message_id = 2;
}

// Domain event: inbound message was handled synchronously by the channel actor
// (for example deterministic card/tool flows) and can be durably deduplicated.
message ChannelInboundHandledEvent {
  string message_id = 1;
}

// Domain event: chat session completed (reply sent or timed out)
message ChannelChatCompletedEvent {
  string session_id = 1;
}

// Self-event: chat response timeout (scheduled via ScheduleSelfDurableTimeoutAsync)
message ChannelChatTimeoutEvent {
  string session_id = 1;
}

// Callback endpoint → ChannelUserGAgent inbound dispatch
message ChannelInboundEvent {
  string text = 1;
  string sender_id = 2;
  string sender_name = 3;
  string conversation_id = 4;
  string message_id = 5;
  string chat_type = 6;
  string platform = 7;
  string registration_id = 8;
  string registration_token = 9;      // fallback token from registration
  string registration_scope_id = 10;
  string nyx_provider_slug = 11;
  map<string, string> extra = 12;
}
