syntax = "proto3";

package aevatar.gagents.channel.runtime;

option csharp_namespace = "Aevatar.GAgents.Channel.Runtime";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "chat_activity.proto";
import "channel_contracts.proto";
import "schedule.proto";

message OutboundDeliveryReceipt {
  string reply_message_id = 1;
}

message ConversationTurnCompletedEvent {
  string processed_activity_id = 1;
  string causation_command_id = 2;
  string sent_activity_id = 3;
  string auth_principal = 4;
  aevatar.gagents.channel.abstractions.ConversationReference conversation = 5;
  aevatar.gagents.channel.abstractions.MessageContent outbound = 6;
  int64 completed_at_unix_ms = 7;
  OutboundDeliveryReceipt outbound_delivery = 8;
}

message NeedsLlmReplyEvent {
  string correlation_id = 1;
  string target_actor_id = 2;
  string registration_id = 3;
  aevatar.gagents.channel.abstractions.ChatActivity activity = 4;
  map<string, string> metadata = 5;
  int64 requested_at_unix_ms = 6;
  // Transient inbox-only credential. The actor MUST clear `reply_token` and
  // `reply_token_expires_at_unix_ms` (set them to the empty default) on the
  // copy passed to PersistDomainEventAsync; only the inbox-bound copy may
  // carry them so the LLM worker can echo the credential back without the
  // actor's in-memory dict surviving deactivation. Never persist to event
  // store, projection, or read model.
  string reply_token = 7;
  int64 reply_token_expires_at_unix_ms = 8;
}

// Transient actor-inbox envelope used by the NyxID relay endpoint to hand a single
// inbound callback turn to ConversationGAgent together with the short-lived reply
// credential. The actor MUST NOT persist this message or any of its fields into
// event store, projection, read model, or any durable state. The handler is
// expected to immediately move `reply_token` and `reply_token_expires_at_unix_ms`
// into actor-owned in-memory runtime state (keyed by `correlation_id`) and only
// persist downstream domain events that omit the reply credential entirely.
message NyxRelayInboundActivity {
  aevatar.gagents.channel.abstractions.ChatActivity activity = 1;
  string reply_token = 2;
  int64 reply_token_expires_at_unix_ms = 3;
  string correlation_id = 4;
}

enum LlmReplyTerminalState {
  LLM_REPLY_TERMINAL_STATE_UNSPECIFIED = 0;
  LLM_REPLY_TERMINAL_STATE_COMPLETED = 1;
  LLM_REPLY_TERMINAL_STATE_FAILED = 2;
}

message LlmReplyReadyEvent {
  string correlation_id = 1;
  string registration_id = 2;
  string source_actor_id = 3;
  aevatar.gagents.channel.abstractions.ChatActivity activity = 4;
  aevatar.gagents.channel.abstractions.MessageContent outbound = 5;
  LlmReplyTerminalState terminal_state = 6;
  string error_code = 7;
  string error_summary = 8;
  int64 ready_at_unix_ms = 9;
  // Transient inbox-echoed credential carried back from the LLM worker so the
  // actor's outbound relay reply does not depend on its in-memory token dict
  // surviving deactivation. The actor consumes these fields directly and never
  // persists them. The inbox subscriber copies the values from the inbound
  // NeedsLlmReplyEvent verbatim.
  string reply_token = 10;
  int64 reply_token_expires_at_unix_ms = 11;
}

message DeferredLlmReplyDispatchRequestedEvent {
  string correlation_id = 1;
  int64 requested_at_unix_ms = 2;
}

message NyxRelayReplyTokenCleanupRequestedEvent {
  string correlation_id = 1;
  int64 requested_at_unix_ms = 2;
}

// Sent by ChannelLlmReplyInboxRuntime when its pre-LLM gates (stale age,
// missing relay credential, malformed payload) refuse to process a deferred
// LLM reply. The actor consumes this to retire the matching pending entry
// from State.PendingLlmReplyRequests via a NotRetryable
// ConversationContinueFailedEvent, so the request never silently
// accumulates in actor state.
message DeferredLlmReplyDroppedEvent {
  string correlation_id = 1;
  string reason = 2;
  int64 dropped_at_unix_ms = 3;
}

message ConversationContinueRequestedEvent {
  string command_id = 1;
  string correlation_id = 2;
  string causation_id = 3;
  aevatar.gagents.channel.abstractions.PrincipalKind kind = 4;
  string principal_ref = 5;
  string on_behalf_of_user_id = 6;
  aevatar.gagents.channel.abstractions.ConversationReference conversation = 7;
  aevatar.gagents.channel.abstractions.MessageContent payload = 8;
  int64 dispatched_at_unix_ms = 9;
}

message ConversationContinueRejectedEvent {
  string command_id = 1;
  string correlation_id = 2;
  string causation_id = 3;
  RejectReason reason = 4;
  string reason_detail = 5;
  int64 rejected_at_unix_ms = 6;
}

enum RejectReason {
  REJECT_REASON_UNSPECIFIED = 0;
  REJECT_REASON_DUPLICATE_COMMAND = 1;
  REJECT_REASON_CONVERSATION_NOT_FOUND = 2;
  REJECT_REASON_CREDENTIAL_REF_INVALID = 3;
  REJECT_REASON_CREDENTIAL_REVOKED_OR_EXPIRED = 4;
  REJECT_REASON_PRINCIPAL_NOT_AUTHORIZED = 5;
}

message ConversationContinueFailedEvent {
  string command_id = 1;
  string correlation_id = 2;
  string causation_id = 3;
  FailureKind kind = 4;
  string error_code = 5;
  string error_summary = 6;
  oneof retry_policy {
    google.protobuf.Empty not_retryable = 7;
    int64 retry_after_ms = 8;
  }
  int64 failed_at_unix_ms = 9;
}

enum FailureKind {
  FAILURE_KIND_UNSPECIFIED = 0;
  FAILURE_KIND_TRANSIENT_ADAPTER_ERROR = 1;
  FAILURE_KIND_PERMANENT_ADAPTER_ERROR = 2;
  FAILURE_KIND_CREDENTIAL_RESOLUTION_FAILED = 3;
  FAILURE_KIND_PLATFORM_UNAVAILABLE = 4;
}

message ChannelBotRegistrationEntry {
  aevatar.gagents.channel.abstractions.ChannelTransportBinding transport_binding = 1;
  string webhook_url = 2;
  google.protobuf.Timestamp created_at = 3;
  bool is_deleted = 4;
}

message UserAgentCatalogEntry {
  string agent_id = 1;
  aevatar.gagents.channel.abstractions.ConversationReference conversation = 2;
  string nyx_provider_slug = 3;
  string owner_nyx_user_id = 4;
  string agent_type = 5;
  string template_name = 6;
  string scope_id = 7;
  string api_key_id = 8;
  aevatar.gagents.channel.abstractions.ScheduleState schedule = 9;
  string status = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  bool is_deleted = 13;
}

message DeviceRegistrationEntry {
  string id = 1;
  string scope_id = 2;
  string nyx_conversation_id = 3;
  string description = 4;
  string credential_ref = 5;
  google.protobuf.Timestamp created_at = 6;
  bool is_deleted = 7;
}
