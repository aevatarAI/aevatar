syntax = "proto3";

package aevatar.gagents.channel.runtime;

option csharp_namespace = "Aevatar.GAgents.Channel.Runtime";

message LeaseToken {
  bytes owner = 1;
  int64 expires_at_unix_ms = 2;
  string shard_id = 3;
  int64 epoch = 4;
}

message SessionState {
  string session_id = 1;
  int64 last_seq = 2;
  int64 updated_epoch = 3;
}
