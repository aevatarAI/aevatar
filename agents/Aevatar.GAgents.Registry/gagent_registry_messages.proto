syntax = "proto3";
package aevatar.gagents.registry;
option csharp_namespace = "Aevatar.GAgents.Registry";

// ─── State ───

message GAgentRegistryEntry {
  string gagent_type = 1;
  repeated string actor_ids = 2;
}

message GAgentRegistryState {
  repeated GAgentRegistryEntry groups = 1;
}

// ─── Events ───

message ActorRegisteredEvent {
  string gagent_type = 1;
  string actor_id = 2;
}

message ActorUnregisteredEvent {
  string gagent_type = 1;
  string actor_id = 2;
}

// ─── Readmodel ───

// Published by ReadModel GAgent so subscribers can observe the current projected state.
message GAgentRegistryStateSnapshotEvent {
  GAgentRegistryState snapshot = 1;
}

// Sent from WriteGAgent to ReadModelGAgent via SendToAsync to push state updates.
message GAgentRegistryReadModelUpdateEvent {
  GAgentRegistryState snapshot = 1;
}
