syntax = "proto3";
package aevatar.gagents.registry;
option csharp_namespace = "Aevatar.GAgents.Registry";

// ─── State ───

message GAgentRegistryEntry {
  string gagent_type = 1;
  repeated string actor_ids = 2;
}

message GAgentRegistryState {
  repeated GAgentRegistryEntry groups = 1;
}

// ─── Events ───

message ActorRegisteredEvent {
  string gagent_type = 1;
  string actor_id = 2;
}

message ActorUnregisteredEvent {
  string gagent_type = 1;
  string actor_id = 2;
}

// ─── Admission ───

enum GAgentRegistryOperation {
  UNKNOWN = 0;
  USE = 1;
  DELETE = 2;
  CHAT = 3;
  STREAM = 4;
  APPROVE = 5;
  JOIN = 6;
  LIST_PARTICIPANTS = 7;
  DRAFT_RUN_REUSE = 8;
}

message ScopeResourceAdmissionRequested {
  string gagent_type = 1;
  string actor_id = 2;
  GAgentRegistryOperation operation = 3;
  string scope_id = 4;
}
