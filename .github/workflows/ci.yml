name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - refactor/**

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Restore
        run: dotnet restore aevatar.slnx --nologo

      - name: Build
        run: dotnet build aevatar.slnx --nologo --no-restore --tl:off -m:1 -p:UseSharedCompilation=false -p:NuGetAudit=false

      - name: Coverage Quality Guard
        env:
          COVERAGE_LINE_THRESHOLD: "85"
          COVERAGE_BRANCH_THRESHOLD: "72"
        run: bash tools/ci/coverage_quality_guard.sh

      - name: Architecture Guards (full-scan + projection route mapping)
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: bash tools/ci/architecture_guards.sh

      - name: Test Stability Guards
        run: bash tools/ci/test_stability_guards.sh

      - name: Solution Split Test Guards
        env:
          SPLIT_TEST_NO_RESTORE: "1"
          SPLIT_TEST_NO_BUILD: "1"
        run: bash tools/ci/solution_split_test_guards.sh

      - name: Start Kafka for Distributed Integration Test
        run: docker compose up -d kafka

      - name: Wait for Kafka Health
        run: |
          for i in {1..30}; do
            status="$(docker inspect --format='{{.State.Health.Status}}' aevatar-kafka || true)"
            if [ "${status}" = "healthy" ]; then
              echo "Kafka is healthy."
              exit 0
            fi

            echo "Kafka status: ${status:-unknown}"
            sleep 2
          done

          echo "Kafka failed to become healthy."
          docker logs aevatar-kafka || true
          exit 1

      - name: Distributed Kafka Integration Test
        env:
          AEVATAR_TEST_KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
        run: |
          dotnet test test/Aevatar.Foundation.Runtime.Hosting.Tests/Aevatar.Foundation.Runtime.Hosting.Tests.csproj \
            --nologo \
            --tl:off \
            -m:1 \
            -p:UseSharedCompilation=false \
            -p:NuGetAudit=false \
            --no-restore \
            --filter "FullyQualifiedName~OrleansMassTransitRuntimeIntegrationTests.KafkaTransport_ShouldDeliverEnvelopeToRuntimeActorGrain"

      - name: Stop Kafka (always)
        if: always()
        run: docker compose down --volumes --remove-orphans
