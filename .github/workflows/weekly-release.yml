name: weekly-release

on:
  # Every Friday at 15:00 UTC (23:00 CST)
  schedule:
    - cron: "0 15 * * 5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-release
  cancel-in-progress: false

jobs:
  check-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      previous_tag: ${{ steps.check.outputs.previous_tag }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for new commits since last tag
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v*" HEAD 2>/dev/null || true)
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tags found. Will create baseline."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "previous_tag=" >> "$GITHUB_OUTPUT"
            echo "version=v0.1.0" >> "$GITHUB_OUTPUT"
            exit 0
          else
            COMMITS_SINCE=$(git rev-list --count "${LAST_TAG}..HEAD")
            echo "Commits since ${LAST_TAG}: ${COMMITS_SINCE}"
            echo "previous_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"
            if [ "$COMMITS_SINCE" -eq 0 ]; then
              echo "No new commits. Skipping."
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              exit 0
            else
              # Bump patch version
              CURRENT=$(echo "$LAST_TAG" | sed 's/^v//')
              MAJOR=$(echo "$CURRENT" | cut -d. -f1)
              MINOR=$(echo "$CURRENT" | cut -d. -f2)
              PATCH=$(echo "$CURRENT" | cut -d. -f3)
              NEW_PATCH=$((PATCH + 1))
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
              echo "version=v${MAJOR}.${MINOR}.${NEW_PATCH}" >> "$GITHUB_OUTPUT"
            fi
          fi

  release-gate:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Prepare Runner
        uses: ./.github/actions/prepare-runner
        with:
          install-ripgrep: "true"

      - name: Architecture Guards
        run: |
          ZERO_SHA="0000000000000000000000000000000000000000"
          CURRENT_SHA=$(git rev-parse HEAD)
          PREVIOUS_SHA=$(git rev-parse HEAD^ 2>/dev/null || echo "$ZERO_SHA")
          GITHUB_EVENT_NAME=push \
          GITHUB_EVENT_BEFORE="$PREVIOUS_SHA" \
          GITHUB_SHA="$CURRENT_SHA" \
          bash tools/ci/architecture_guards.sh

      - name: Test Stability Guards
        run: bash tools/ci/test_stability_guards.sh

      - name: Split Test Guards
        run: bash tools/ci/solution_split_test_guards.sh

      - name: Distributed 3-Node Smoke
        run: bash tools/ci/distributed_3node_smoke.sh

      - name: Distributed Mixed-Version Smoke
        run: bash tools/ci/distributed_mixed_version_smoke.sh

  weekly-tag:
    needs:
      - check-changes
      - release-gate
    if: needs.check-changes.outputs.has_changes == 'true' && needs.release-gate.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge dev into master and tag
        run: |
          VERSION="${{ needs.check-changes.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin master
          git checkout master
          git merge origin/dev --no-edit --ff-only || {
            echo "::error::Cannot fast-forward master to dev. Manual merge required."
            exit 1
          }

          git tag -a "${VERSION}" -m "Weekly release ${VERSION}"
          git push origin master --tags

          echo "Tagged ${VERSION} on master."

      - name: Create GitHub Release
        run: |
          VERSION="${{ needs.check-changes.outputs.version }}"
          LAST_TAG="${{ needs.check-changes.outputs.previous_tag }}"

          if [ -n "$LAST_TAG" ]; then
            BODY=$(git log --oneline "${LAST_TAG}..${VERSION}" | head -30)
          else
            BODY="Baseline release."
          fi

          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --notes "${BODY}" \
            --target master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
