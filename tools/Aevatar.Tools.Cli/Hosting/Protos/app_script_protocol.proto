syntax = "proto3";

package aevatar.tools.cli.hosting;

option csharp_namespace = "Aevatar.Tools.Cli.Hosting";

import "scripting_schema_options.proto";
import "scripting_runtime_options.proto";

message AppScriptCommand {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_COMMAND
    command_id_field: "command_id"
  };

  string command_id = 1 [json_name = "command_id"];
  string input = 2 [json_name = "input"];
}

message AppScriptReadModel {
  option (aevatar.scripting.schema.scripting_read_model) = {
    schema_id: "app_script"
    schema_version: "1"
    store_kinds: "document"
  };

  string input = 1 [json_name = "input", (aevatar.scripting.schema.scripting_field) = { storage_type: "text" }];
  string output = 2 [json_name = "output", (aevatar.scripting.schema.scripting_field) = { storage_type: "text" }];
  string status = 3 [json_name = "status", (aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
  string last_command_id = 4 [json_name = "last_command_id", (aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
  repeated string notes = 5 [json_name = "notes", (aevatar.scripting.schema.scripting_field) = { storage_type: "keyword" }];
}

message AppScriptUpdated {
  option (aevatar.scripting.runtime.scripting_runtime) = {
    kind: SCRIPTING_MESSAGE_KIND_DOMAIN_EVENT
    projectable: true
    replay_safe: true
    command_id_field: "command_id"
    read_model_scope: "aevatar.tools.cli.hosting.AppScriptReadModel"
  };

  string command_id = 1 [json_name = "command_id"];
  AppScriptReadModel current = 2 [json_name = "current"];
}
